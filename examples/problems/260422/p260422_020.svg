<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1390" height="216" viewBox="0 0 1390 216">
  <rect x="0" y="0" width="1390" height="216" fill="#FFFFFF" />
  <text id="slot.text.1.text" x="28" y="60" max_width="1262" fill="#000000" font-family="Noto Sans KR, sans-serif" font-size="45">용희네 농장에서 닭과 오리를 키우고 있습니다. 닭이 498마리, 오</text>
  <text id="slot.text.2.text" x="28" y="140" max_width="1262" fill="#000000" font-family="Noto Sans KR, sans-serif" font-size="45">리는 닭보다 117마리 더 많다고 합니다. 용희네 농장에서 키우고</text>
  <text id="slot.text.3.text" x="28" y="210" max_width="1262" fill="#000000" font-family="Noto Sans KR, sans-serif" font-size="45">있는 닭과 오리는 모두 몇 마리입니까?</text>
</svg>

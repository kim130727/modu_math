  <text id="slot.q1.text" x="14" y="44" max_width="677" fill="#222222" font-family="Malgun Gothic" font-size="30" text-anchor="start" data-semantic-role="instruction">준호네 학교 학생들이 좋아하는 과일을 조사한 원그래프입니다.</text>
  <text id="slot.q2.text" x="14" y="94" max_width="677" fill="#222222" font-family="Malgun Gothic" font-size="30" text-anchor="start" data-semantic-role="instruction">바나나를 좋아하는 학생이 60명이면 전체 학생 수는</text>
  <text id="slot.q3.text" x="14" y="142" max_width="677" fill="#222222" font-family="Malgun Gothic" font-size="30" text-anchor="start" data-semantic-role="instruction">몇 명인가요?</text>

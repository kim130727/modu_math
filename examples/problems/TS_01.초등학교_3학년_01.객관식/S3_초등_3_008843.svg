  <text id="slot.body1.text" x="16" y="365" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">(1) 가에서 각도기와 컴퍼스 중 더 가벼운 것은 ( 각도기, 컴퍼스 )이고,</text>
  <text id="slot.body2.text" x="16" y="410" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">나에서 지우개와 컴퍼스 중 더 가벼운 것은 ( 지우개, 컴퍼스 )입니다.</text>

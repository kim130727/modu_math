  <text id="slot.q_title.text" x="16" y="28" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">84. 저울로 각도기, 컴퍼스, 지우개의 무게를 비교하고 있습니다. 가장 가벼운 것은 무엇인지 알맞은 말을 선택해 보세요.</text>
  <text id="slot.ga_label.text" x="170" y="120" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">가</text>

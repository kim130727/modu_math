  <text id="slot.qtext.text" x="52" y="26" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">영은이는 학교 학생들이 주말에 가고 싶은 장소를 남학생과 여학생으로 나누어 표로 나타내었습니다. 가장 많은 남학생이 가고 싶은 장소를 선택해 보세요.</text>
  <text id="slot.table.title.text" x="260" y="122" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">주말에 가고 싶은 장소별 남녀 학생 수</text>

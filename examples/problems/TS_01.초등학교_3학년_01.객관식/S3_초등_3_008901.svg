  <text id="slot.q_text_1.text" x="92" y="22" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">어느 가게에서 일주일 동안 팔린 아이스크림 수를 조사하여 그림그래프로 나타내었습니다.</text>
  <text id="slot.q_text_2.text" x="12" y="56" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">딸기 맛과 바닐라 맛 아이스크림 중 더 많이 팔린 아이스크림을 선택해 보세요.</text>

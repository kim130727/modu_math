  <text id="slot.q1.text" x="18" y="40" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">25. 꽃병과 항아리에 물을 가득 채우려면 ㉠ 컵과 ㉡ 컵으로 다음과 같이 각각 부어야 합니다. 잘못 이야기한 친구의 이름을 선택하세요.</text>
  <text id="slot.table.h1.text" x="375" y="120" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="26">가 컵</text>
  <text id="slot.table.h2.text" x="505" y="120" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="26">나 컵</text>
  <text id="slot.table.c1.text" x="314" y="160" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="26">꽃병</text>
  <text id="slot.table.c2.text" x="382" y="160" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="26">3개</text>
  <text id="slot.table.c3.text" x="508" y="160" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="26">4개</text>
  <text id="slot.table.c4.text" x="314" y="202" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="26">항아리</text>
  <text id="slot.s1.text" x="119" y="290" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">· 진수: 꽃병보다 항아리에 물을 더 많이 담을 수 있어.</text>
  <text id="slot.s2.text" x="119" y="331" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">· 유빈: 항아리의 들이는 꽃병의 들이의 2배야.</text>
  <text id="slot.s3.text" x="119" y="372" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">· 윤후: ㉠ 컵과 ㉡ 컵 중에 들이가 더 많은 컵은 ㉡ 컵이야.</text>

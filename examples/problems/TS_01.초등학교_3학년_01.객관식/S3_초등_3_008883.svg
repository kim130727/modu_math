  <text id="slot.q2.text" x="58" y="24" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">연우네 학교 학생들이 방과 후 수업으로 배우고 싶어 하는 운동을 조사하여 나타낸 표입니다. 표를 보고 알맞은 말을 선택해 보세요.</text>
  <text id="slot.table_title.text" x="480" y="115" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">여학생과 남학생이 배우고 싶어 하는 운동</text>

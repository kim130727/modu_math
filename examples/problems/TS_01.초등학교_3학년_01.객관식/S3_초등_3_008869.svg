  <text id="slot.q2.text" x="88" y="28" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">어항에 물을 가득 채운 후 수조에 옮겨 담았습니다.</text>
  <text id="slot.q3.text" x="12" y="64" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">그림과 같이 수조를</text>
  <text id="slot.q4.text" x="12" y="100" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">가득 채우고 어항에 물이 남았다면 어항과 수조 중 들이가 더 많은 것은 어느 것인가요?</text>

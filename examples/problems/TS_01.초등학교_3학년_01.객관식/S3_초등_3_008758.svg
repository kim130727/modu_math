  <text id="slot.q.text.text" x="85" y="26" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">주스병의 들이를 적절히 어림한 친구를 선택해 보세요.</text>
  <text id="slot.top.text.text" x="352" y="96" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">
    <tspan x="352" dy="0">주스병에는 200 mL 유우컵으로 4번쯤</tspan>
    <tspan x="352" dy="1.2em">들어갈 것 같아. 들이는 약 800 mL야.</tspan>
  </text>
  <text id="slot.bottom.text.text" x="264" y="228" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">

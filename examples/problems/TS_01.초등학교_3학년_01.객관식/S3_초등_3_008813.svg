  <text id="slot.q1.text" x="14" y="47" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">우유병에 물을 가득 채운 후 컵에 옮겨 담았더니 우유병에 물이 남았습니다.</text>

  <text id="slot.s1.text" x="68" y="298" max_width="812" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">종이컵의 들이는 500 mL 생수병의 들이보다 ( 많습니다, 적습니다 ).</text>

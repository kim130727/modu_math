  <text id="slot.q1.text" x="18" y="28" max_width="812" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">53. 500 mL 생수병을 보고 들이를 어림해 보려고 합니다. 알맞은 것을 선택하세요.</text>

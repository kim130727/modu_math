<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="940" height="478" viewBox="0 0 940 478">
  <metadata><problem_id>S3_초등_3_008878</problem_id></metadata>
  <rect x="0" y="0" width="940" height="478" fill="#FFFFFF" />
  <text id="slot.q_no.text" x="12" y="28" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">□ 33.</text>
  <text id="slot.q1.text" x="56" y="30" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">바나나와 오이를 양손에 들어 보니 무게가 비슷하여 어느 것이 더 무거운지 알 수 없습니다. 바나나와 오이의 무게를 비교할 수 있는 방법을 바로</text>
  <text id="slot.q2.text" x="46" y="74" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">게 말한 것을 선택해 보세요.</text>
  <text id="slot.opt1.text" x="26" y="230" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">① 바나나와 오이의 길이를 각각 재어 비교해. 길이가 더 긴 쪽이 더 무거워.</text>
  <text id="slot.opt2.text" x="26" y="276" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28" data-raw-text="② 저울의 양쪽 접시에 바나나와 오이를 각각 올려놓고 무게를 비교해. 아래
   로 내려간 쪽이 더 무거워.">
    <tspan x="26" dy="0">② 저울의 양쪽 접시에 바나나와 오이를 각각 올려놓고 무게를 비교해. 아래</tspan>
    <tspan x="26" dy="1.2em">   로 내려간 쪽이 더 무거워.</tspan>
  </text>
  <text id="slot.banana.text" x="372" y="132" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">바나나</text>
  <text id="slot.cucumber.text" x="512" y="132" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">오이</text>
</svg>

  <text id="slot.explain.eq.text" x="63" y="506" max_width="744" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="23">99 ÷ 8 = 12⋯3</text>
  <text id="slot.explain.left.text" x="37" y="540" max_width="744" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="22">근희: 몫은 12이므로 10보다 큽니다.</text>
  <text id="slot.explain.mid.text" x="37" y="573" max_width="744" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="22">영표: 나머지는 3이므로 나누어떨어지지 않습니다.</text>
  <text id="slot.explain.right.text" x="37" y="607" max_width="744" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="22">슬기: 나머지는 3이므로 8보다 작습니다.</text>

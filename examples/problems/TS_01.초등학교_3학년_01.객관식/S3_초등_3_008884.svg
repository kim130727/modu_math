  <text id="slot.q1.text" x="14" y="26" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">48. 서영이는 교실에 색종이가 색깔별로 몇 장 있는지 조사하였습니다. 표를 보고 알맞은 말을 선택해 보세요.</text>

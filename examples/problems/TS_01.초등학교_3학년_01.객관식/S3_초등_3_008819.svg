  <text id="slot.no.text" x="12" y="26" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">□ 53.</text>
  <text id="slot.q1.text" x="78" y="26" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">꽃병과 음료수병에 물을 가득 채운 후, 모양과 크기가 같은 그릇에 옮겨</text>
  <text id="slot.q2.text" x="12" y="62" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">담았습니다. 그림과 같이 물을 채웠을 때에 꽃병과 음료수병 중 들이가 더</text>
  <text id="slot.choice.text" x="12" y="98" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">많은 것은 어느 것인지 선택해 보세요.</text>

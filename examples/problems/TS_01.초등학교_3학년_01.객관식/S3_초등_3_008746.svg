  <text id="slot.q2.text" x="63" y="28" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">두 물병에 물을 가득 채운 후 모양과 크기가 같은 컵에 각각 옮겨 담았습니다. 바르게 설명했으면 ○표, 그렇지 않으면 ×표를 선택하세요.</text>

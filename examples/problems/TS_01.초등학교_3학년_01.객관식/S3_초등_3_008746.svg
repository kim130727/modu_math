  <text id="slot.q33.text" x="237" y="235" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">나 물병이 컵 1개만큼 물이 더 들어갑니다.</text>
  <text id="slot.q34.text" x="33" y="265" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">○</text>

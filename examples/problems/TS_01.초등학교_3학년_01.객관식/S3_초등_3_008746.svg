  <text id="slot.q40.text" x="69" y="411" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">나 물병이 가 물병보다 컵 6 - 5 = 1(개)만큼 물이 더 들어갑니다.</text>

  <text id="slot.q1.text" x="18" y="28" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">69. 보온병의 들이를 더 적절히 어린 친구는 누구인지 선택해 보세요.</text>
  <text id="slot.bubble.left.l1.text" x="122" y="76" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">보온병에 200 mL 우유갑으로</text>
  <text id="slot.bubble.left.l2.text" x="138" y="112" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">4번쯤 들어갈 것 같아.</text>
  <text id="slot.bubble.left.l3.text" x="145" y="148" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">들이는 약 600 mL야.</text>
  <text id="slot.bubble.right.l1.text" x="545" y="76" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">보온병은 1 L 우유갑과</text>
  <text id="slot.bubble.right.l2.text" x="536" y="112" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">들이가 비슷할 것 같아.</text>
  <text id="slot.bubble.right.l3.text" x="541" y="148" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">들이는 약 1000 mL야.</text>
  <text id="slot.name.left.text" x="257" y="329" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">나래</text>
  <text id="slot.name.right.text" x="691" y="329" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">재석</text>

  <text id="slot.q3.text" x="106" y="29" max_width="812" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">물병과 우유병의 높이를 비교하려고 합니다. 두 병의 높이를 비교하는</text>

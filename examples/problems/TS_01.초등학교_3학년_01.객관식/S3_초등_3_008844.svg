  <text id="slot.opt.c.text" x="17" y="381" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">(2) 컴퍼스보다 각도기가 가볍고, 지우개보다 컴퍼스가 가벼우므로 가장 가벼운 것은</text>

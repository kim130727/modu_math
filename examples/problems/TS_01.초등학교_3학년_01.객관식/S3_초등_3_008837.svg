  <text id="slot.q2.text" x="64" y="42" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">야구공과 큐브를 양손에 들어 보니 무게가 비슷하여 어느 것이 더 무거</text>
  <text id="slot.q3.text" x="64" y="78" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">운지 알 수 없습니다. 두 물건의 무게를 비교할 수 있는 방법을 바르게 말했</text>
  <text id="slot.q4.text" x="64" y="114" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">으면 ○표, 그렇지 않으면 ×표를 선택하세요.</text>

  <text id="slot.speech.text" x="388" y="148" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28" data-raw-text="저울의 양쪽 접시에 각각
올려놓았을 때 위로 올라간
쪽의 물건이 더 무거워.">
    <tspan x="388" dy="0">저울의 양쪽 접시에 각각</tspan>

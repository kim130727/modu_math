  <text id="slot.qtext1.text" x="52" y="24" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">유우병에 물을 가득 채운 후 페트병에 옮겨 담았습니다. 그림과 같이 물</text>

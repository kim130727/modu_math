  <rect x="0" y="0" width="952" height="602" fill="#FFFFFF" />
  <circle id="slot.left.face.circle" cx="330" cy="328" r="2" stroke="#111111" stroke-width="2" fill="#222222" />
  <circle id="slot.right.face.circle" cx="596" cy="328" r="2" stroke="#111111" stroke-width="2" fill="#222222" />
  <text id="slot.q1.text" x="12" y="24" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">□ 31. 고구마와 감자를 양손에 들어 보니 어느 것이 더 무거</text>
  <text id="slot.q2.text" x="12" y="58" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">운지 알 수 없었습니다. 고구마와 감자의 무게를 비교할 수 있는 방법을 바</text>
  <text id="slot.q3.text" x="12" y="92" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">르게 말한 사람을 선택해 보세요.</text>
  <text id="slot.left.speech.text" x="116" y="164" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28" data-raw-text="눈으로 크기를
비교해 보면 크기가
조금이라도 더 큰 것이
더 무거워.">
    <tspan x="116" dy="0">눈으로 크기를</tspan>
    <tspan x="116" dy="1.2em">비교해 보면 크기가</tspan>
    <tspan x="116" dy="1.2em">조금이라도 더 큰 것이</tspan>
    <tspan x="116" dy="1.2em">더 무거워.</tspan>
  </text>
  <text id="slot.left.name.text" x="304" y="448" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">상규</text>
  <text id="slot.right.speech.text" x="606" y="164" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28" data-raw-text="저울의 양쪽 접시에
고구마와 감자를 각각 올려
접시가 아래로 내려온 것이
더 무거워.">
    <tspan x="606" dy="0">저울의 양쪽 접시에</tspan>
    <tspan x="606" dy="1.2em">고구마와 감자를 각각 올려</tspan>
    <tspan x="606" dy="1.2em">접시가 아래로 내려온 것이</tspan>
    <tspan x="606" dy="1.2em">더 무거워.</tspan>
  </text>
  <text id="slot.right.name.text" x="568" y="448" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">민하</text>
</svg>

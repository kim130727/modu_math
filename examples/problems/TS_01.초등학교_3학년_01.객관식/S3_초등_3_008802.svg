  <text id="slot.q1.text" x="14.001" y="38" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">고구마와 감자를 양손에 들어 보니 어느 것이 더 무거운지 알 수 없었습니다.</text>

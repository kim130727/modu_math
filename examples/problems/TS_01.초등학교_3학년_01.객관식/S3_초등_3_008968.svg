  <text id="slot.q1.text" x="12" y="20" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">2.  현주는 집 주변 나무들의 높이를 조사했습니다. 두 나무의 높이 차가</text>
  <text id="slot.q2.text" x="12" y="52" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">100 cm에 가장 가까운 나무는 어떤 나무와 어떤 나무인지 알맞은 것을 선택</text>
  <text id="slot.q3.text" x="12" y="84" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">하세요.</text>
  <text id="slot.table.r1c1.text" x="138" y="128" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="20">나무 종류</text>
  <text id="slot.table.r1c2.text" x="233" y="128" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="20">소나무</text>
  <text id="slot.table.r1c3.text" x="314" y="128" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="20">전나무</text>
  <text id="slot.table.r1c4.text" x="394" y="128" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="20">벚나무</text>
  <text id="slot.table.r2c1.text" x="138" y="152" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="20">높이(cm)</text>
  <text id="slot.table.r2c2.text" x="234" y="152" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="20">247</text>
  <text id="slot.table.r2c3.text" x="316" y="152" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="20">356</text>
  <text id="slot.table.r2c4.text" x="398" y="152" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="20">115</text>
  <text id="slot.choice.text" x="365" y="188" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="20">( 소나무, 전나무, 벚나무 )</text>
  <text id="slot.a2.text" x="12" y="258" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="18">(풀이)</text>
  <text id="slot.a3.text" x="28" y="281" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="18">(전나무) - (소나무) = 356 - 247 = 109(cm)</text>
  <text id="slot.a4.text" x="28" y="304" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="18">(소나무) - (벚나무) = 247 - 115 = 132(cm)</text>
  <text id="slot.a5.text" x="28" y="327" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="18">(전나무) - (벚나무) = 356 - 115 = 241(cm)</text>
  <text id="slot.a6.text" x="28" y="350" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="18">두 나무의 높이의 차가 100 cm에 가장 가까운 나무는 소나무와 전나무입니다.</text>
  <text id="slot.a7.text" x="0" y="0" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="18"></text>

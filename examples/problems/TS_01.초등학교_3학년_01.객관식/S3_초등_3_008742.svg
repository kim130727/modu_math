  <text id="slot.q2.text" x="20" y="45" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="30">두 분수의 크기를 비교하여 빨간색 선을 만나면 큰 분수를, 파란색 선을 만나면</text>

  <text id="slot.ex2.text" x="16" y="620" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">23/15 &lt; 26/15 이므로 파란색 선을 만나서 작은 분수인 23/15이 빈칸으로 올라갑니다.</text>
  <text id="slot.ex3.text" x="16" y="940" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">1 3/15과 23/15의 크기를 비교하면 23/15 = 1 8/15이므로 1 3/15 &lt; 23/15입니다.</text>

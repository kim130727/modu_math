  <text id="slot.q2.text" x="56" y="48" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">두 분수의 크기를 비교하여 빨간색 선을 만나면 큰 분수를, 파란색 선을 만나면</text>
  <text id="slot.q3.text" x="16" y="86" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">작은 분수를 빈칸에 써넣으려고 합니다. ㉠에 들어갈 분수로 알맞은 것을 가장 아래칸의 분수들 중에 선택해 보세요.</text>

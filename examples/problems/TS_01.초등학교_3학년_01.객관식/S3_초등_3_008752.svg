  <text id="slot.q1.text" x="50" y="30" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">49. 주전자와 냄비에 물을 가득 채우려면 ㉠ 컵과 ㉡ 컵을 다음과 같이 각각</text>
  <text id="slot.q2.text" x="50" y="63" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">부어야 합니다. 바르게 이야기한 것을 선택하세요.</text>
  <rect id="slot.table.bg.rect" x="300" y="87" width="383" height="124" fill="#ffffff" stroke="#111111" stroke-width="1.5" />
  <text id="slot.table.hdr1.text" x="455" y="116" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">㉠ 컵</text>
  <text id="slot.table.hdr2.text" x="572" y="116" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">㉡ 컵</text>
  <text id="slot.table.row1.text" x="352" y="153" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">주전자</text>
  <text id="slot.table.row2.text" x="366" y="190" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">냄비</text>
  <text id="slot.table.c11.text" x="463" y="153" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">3개</text>
  <text id="slot.table.c12.text" x="585" y="153" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">2개</text>
  <text id="slot.table.c21.text" x="463" y="190" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">6개</text>
  <text id="slot.table.c22.text" x="585" y="190" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">4개</text>
  <rect id="slot.box1.rect" x="87" y="220" width="795" height="157" fill="#ffffff" stroke="#111111" stroke-width="1.5" />
  <text id="slot.stmt1.text" x="118" y="270" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">· 경호: 냄비보다 주전자에 물을 더 많이 담을 수 있어.</text>
  <text id="slot.stmt2.text" x="118" y="311" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">· 해원: ㉠ 컵과 ㉡ 컵 중에 들이가 더 많은 컵은 ㉡ 컵이야.</text>
  <text id="slot.stmt3.text" x="118" y="352" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">· 동주: 주전자의 들이는 냄비의 들이의 2배야.</text>

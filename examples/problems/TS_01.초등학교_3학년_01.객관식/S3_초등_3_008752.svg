  <text id="slot.q1.text" x="50" y="34" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">주전자와 냄비에 물을 가득 채우려면 ㉠ 컵과 ㉡ 컵을 다음과 같이 각각</text>
  <text id="slot.q2.text" x="50" y="76" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">부어야 합니다. 바르게 이야기한 것을 선택하세요.</text>

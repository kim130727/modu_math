  <text id="slot.table_2.r1c2.text" x="455" y="145" fill="#111827" font-family="Noto Sans KR, sans-serif" font-size="30" max_width="120" text-anchor="middle">㉠ 컵</text>
  <text id="slot.table_2.r1c3.text" x="610" y="145" fill="#111827" font-family="Noto Sans KR, sans-serif" font-size="30" max_width="120" text-anchor="middle">㉡ 컵</text>
  <text id="slot.table_2.r2c1.text" x="300" y="210" fill="#111827" font-family="Noto Sans KR, sans-serif" font-size="30" max_width="120" text-anchor="middle">주전자</text>

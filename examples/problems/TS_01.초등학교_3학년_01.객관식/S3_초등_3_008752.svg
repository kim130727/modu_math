  <text id="slot.stmt1.text" x="118" y="364" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">· 경호: 냄비보다 주전자에 물을 더 많이 담을 수 있어.</text>
  <text id="slot.stmt2.text" x="118" y="405" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">· 해원: ㉠ 컵과 ㉡ 컵 중에 들이가 더 많은 컵은 ㉡ 컵이야.</text>
  <text id="slot.stmt3.text" x="118" y="446" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">· 동주: 주전자의 들이는 냄비의 들이의 2배야.</text>

  <text id="slot.question.text" x="58" y="31" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">주전자와 분무기에 물을 가득 채운 후 모양과 크기가 같은 작은 컵에 옮겨 담았더니 다음과 같았습니다. 주전자와 분무기 중에서 어느 것이 들이가 더 많을까요?</text>

  <text id="slot.solution.text" x="96" y="194" max_width="727" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="20">(해설) 70 ÷ 7 = 10, 90 ÷ 5 = 18, 60 ÷ 3 = 20</text>
  <text id="slot.solution.final.text" x="96" y="220" max_width="727" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="20">따라서 10&lt;18&lt;20 이므로 몫이 가장 큰 것은 60 ÷ 3 입니다.</text>

  <text id="slot.q1.text" x="32" y="49" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">재영이는 노란색 털실을 9/7 m 가지고 있고 보라색 털실을 1 3/7 m 가지고</text>
  <text id="slot.q2.text" x="30" y="87" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">있습니다. 더 긴 털실은 무슨 색인지 알아보려고 합니다. 물음에 답하세요.</text>

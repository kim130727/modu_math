  <text id="slot.q1.text" x="100" y="30" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">가 그릇, 나 그릇, 다 그릇에 물을 가득 채운 후 모양과 같은 그릇</text>
  <text id="slot.q2.text" x="36" y="66" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">에 옮겨 담았습니다. 그림과 같이 물을 채웠을 때 가 그릇, 나 그릇, 다 그</text>
  <text id="slot.q3.text" x="36" y="102" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">릇 중 들이가 가장 적은 것은 어느 것인지 선택하세요.</text>

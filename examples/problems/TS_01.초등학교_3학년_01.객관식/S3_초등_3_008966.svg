  <text id="slot.q1.text" x="14" y="28" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">36. 윤지네 반 학생들이 받고 싶어 하는 생일 선물을 조사하여 결과를 나타내었습니다. 두 번째로 많은 학생들이 받고 싶어 하는 생일 선물을 선택하세요.</text>

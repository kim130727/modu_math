  <text id="slot.q1.text" x="13" y="31" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">□ 26.  간장병과 기름병에 물을 가득 채운 후 모양과 크기가 같은 그릇에 옮겨</text>
  <text id="slot.q2.text" x="13" y="68" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">담았습니다. 그릇과 같이 물이 채워졌을 때 간장병과 기름병 중 들이가 더</text>
  <text id="slot.q3.text" x="13" y="105" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">많은 것을 선택하세요.</text>

  <text id="slot.q1.text" x="16" y="28" max_width="812" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">☐ 71. 다음과 같은 방법으로 원을 그렸습니다. 그린 원을 보고 알맞은 말을 선</text>
  <text id="slot.q2.text" x="16" y="62" max_width="812" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">택하세요.</text>
  <text id="slot.box2.text" x="120" y="123" max_width="812" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">① 빨간색 점에서 2 cm 떨어진 위치에 점을 찍습니다.</text>
  <text id="slot.box2_2.text" x="120" y="163" max_width="812" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">② 찍은 점들을 이어 원을 그립니다.</text>

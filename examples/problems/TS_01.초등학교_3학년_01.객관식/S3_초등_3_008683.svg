  <text id="slot.choice1.text" x="120" y="514" max_width="812" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">자를 이용하여 점을 더 ( 많이 , 적게 ) 찍은 다음, 점들을 이</text>

  <text id="slot.q_num.text" x="12" y="24" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">□ 57. 선분과 반직선의 다른 점을 바르게 말한 사람의 이름을 선택하세요.</text>

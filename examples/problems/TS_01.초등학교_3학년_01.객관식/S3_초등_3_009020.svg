  <text id="slot.title.text" x="72" y="27" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">반직선과 직선의 다른 점을 바르게 말한 사람의 이름을 선택해 보세요.</text>
  <text id="slot.bubble.left.text.text" x="146" y="90" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="24" data-raw-text="반직선은 한쪽으로
늘어나고 직선은 양쪽으로
늘어남.">
    <tspan x="146" dy="0">반직선은 한쪽으로</tspan>
    <tspan x="146" dy="1.2em">늘어나고 직선은 양쪽으로</tspan>
    <tspan x="146" dy="1.2em">늘어남.</tspan>
  </text>
  <text id="slot.bubble.right.text.text" x="604" y="86" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="24" data-raw-text="반직선은 시작점이
없지만, 직선은
시작점이 없어.">
    <tspan x="604" dy="0">반직선은 시작점이</tspan>
    <tspan x="604" dy="1.2em">없지만, 직선은</tspan>
    <tspan x="604" dy="1.2em">시작점이 없어.</tspan>
  </text>

  <text id="slot.no.text" x="18" y="34" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">100.</text>
  <text id="slot.q1.text" x="78" y="36" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">윤재는 우유병에 물을 가득 채운 후 물병에 옮겨 담고, 다시 우유병에</text>
  <text id="slot.q2.text" x="18" y="76" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">물을 가득 채운 후 주스병에 옮겨 담았습니다. 그러고 같이 물을 채웠을 때에 우유병과 물병, 주스병 중</text>
  <text id="slot.opt.text" x="650" y="436" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">( 우유병 , 물병 , 주스병 )</text>
  <text id="slot.q3.text" x="18" y="116" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">들이가 가장 적은 것은 어느 것인가요?</text>

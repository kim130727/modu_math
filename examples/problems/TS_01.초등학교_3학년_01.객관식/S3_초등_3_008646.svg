  <text id="slot.stem.text" x="72" y="31" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="22">원 모양의 종이를 접어 원의 성질을 알아보고 알맞은 말을 선택하세요.</text>
  <text id="slot.speech.text.text" x="540" y="105" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="22" text-anchor="middle">
    <tspan x="540" dy="0">원 모양의 종이를 둘로 똑같이 나누어지도록</tspan>
    <tspan x="540" dy="1.2em">접었다가 펼친 다음 다른 방향으로 둘로 똑같이</tspan>
    <tspan x="540" dy="1.2em">나누어지도록 접었다가 펼쳤어.</tspan>
  </text>
  <text id="slot.checkbox.text" x="12" y="30" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="18">□</text>
  <text id="slot.correct.text" x="14" y="577" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="18">(정답)지름</text>
  <text id="slot.explain.text" x="14" y="623" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="18">(해설)원을 둘로 똑같이 나누는 선분은 원의 중심을 지나므로 원의 지름입니다.</text>

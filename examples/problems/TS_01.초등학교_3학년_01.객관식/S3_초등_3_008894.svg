  <text id="slot.q58.text" x="20" y="604" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">58. 보고 싶은 문화재별 여학생 수와 남학생 수를 알아보려고 할 때 조사한 자료와 표 중 더 편리한 것을 선택하세요.</text>

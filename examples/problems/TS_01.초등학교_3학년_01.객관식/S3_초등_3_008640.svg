  <text id="slot.exp.text" x="16" y="478" max_width="832" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="20">(해설)반지름은 원의 중심과 원 위의 한 점을 이은 선분이이므로 무수히 많이 그을 수 있습니다.</text>

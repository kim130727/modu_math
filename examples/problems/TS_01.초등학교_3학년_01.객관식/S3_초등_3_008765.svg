  <text id="slot.q1.text" x="16" y="32" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">□ 67. 저울을 사용하여 포크, 국자, 숟가락의 무게를 비교하고 있습니다. 포크,</text>
  <text id="slot.q2.text" x="16" y="68" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">국자, 숟가락 중에서 가장 가벼운 물건은 무엇인지 알아보려고 할 때 알맞</text>
  <text id="slot.q3.text" x="16" y="104" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">은 말을 선택하세요.</text>

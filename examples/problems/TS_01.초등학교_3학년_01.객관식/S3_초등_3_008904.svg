  <text id="slot.q2.text" x="56" y="25" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">영은이는 학교 학생들이 주말에 가고 싶은 장소를 남학생과 여학생으로 나누어 표로 나타냈습니다. 가장 많은 학생이 가고 싶은 장소부터 순서대로 바르게 썼으면 ○표, 그렇지 않으면 ×표를 선택하시오.</text>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="940" height="560" viewBox="0 0 940 560">
  <metadata><problem_id>S3_초등_3_008766</problem_id></metadata>
  <rect x="0" y="0" width="940" height="560" fill="#FFFFFF" />
  <text id="slot.qnum.text" x="16" y="30" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">□ 68.</text>
  <text id="slot.q1.text" x="62" y="30" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">가지와 당근을 양손에 들어 보니 무게가 비슷하여 어느 것이 더 무거운</text>
  <text id="slot.q2.text" x="40" y="64" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">지 알 수 없습니다. 가지와 당근의 무게를 비교할 수 있는 방법을 바르게 말</text>
  <text id="slot.q3.text" x="40" y="98" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">한 것을 선택해 보세요.</text>
  <rect id="slot.bg.ellipse.rect" x="412" y="122" width="150" height="184" fill="#F8EFB7" stroke="none" stroke-width="1.5" rx="75" ry="92" />
  <text id="slot.obj.eggplant.text" x="0" y="0" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28"></text>
  <text id="slot.obj.carrot.text" x="0" y="0" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28"></text>
  <text id="slot.opt1.text" x="22" y="326" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">① 가지와 당근의 길이를 각각 재어 비교해. 길이가 더 긴 쪽이 더 무거워.</text>
  <text id="slot.opt2.text" x="22" y="366" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">② 저울의 양쪽 접시에 가지와 당근을 각각 올려 무게를 비교해. 아래로 내려간 쪽이 더 무거워.</text>
</svg>

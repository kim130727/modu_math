  <text id="slot.title.text" x="14" y="24" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">[95~97] 소진이는 반 학생들이 기르고 싶어 하는 동물을 조사하여 표로 나타내려고 합니다. 물음에 답하세요.</text>

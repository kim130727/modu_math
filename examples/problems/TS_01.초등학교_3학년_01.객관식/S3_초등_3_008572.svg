  <text id="explain_line.text" x="20" y="382" max_width="680" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="20">(해설) 3은 30, 4는 4를 나타내므로 두 수의 곱이 실제로 나타내는 값은 30 × 4 = 120입니다.</text>

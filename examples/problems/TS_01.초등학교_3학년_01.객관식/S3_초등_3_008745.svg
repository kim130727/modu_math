  <text id="slot.diagram.label.na.text" x="598" y="122" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">나</text>
  <text id="slot.choice.1.text" x="36" y="314" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">(1) 옮겨 담은 물의 높이가 더 높은 것은 ( 가 물병, 나 물병)입니다.</text>
  <text id="slot.choice.2.text" x="36" y="350" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">(2) 들이가 더 많은 것은 ( 가 물병, 나 물병)입니다.</text>

  <text id="slot.q1.text" x="16" y="34" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">□ 42.  가 물병과 나 물병에 물을 가득 채운 후 모양과 크기가 같은 그릇에 옮겨</text>
  <text id="slot.q2.text" x="16" y="68" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">담았습니다. 그림과 같이 물을 채웠을 때에 가 물병과 나 물병의 들이를 비교하</text>
  <text id="slot.q3.text" x="16" y="102" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">려고 합니다. 알맞은 말을 선택하세요.</text>

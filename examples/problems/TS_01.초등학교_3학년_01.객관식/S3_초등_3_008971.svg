  <text id="slot.q1.text" x="18" y="22" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">5. 계산 결과가 가장 작은 것을 찾아 기호를 고르세요.</text>
  <text id="slot.eq1.text" x="126" y="51" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">① 658 - 264</text>
  <text id="slot.eq2.text" x="229" y="51" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">② 503 - 119</text>
  <text id="slot.eq3.text" x="332" y="51" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">③ 947 - 472</text>
  <text id="slot.choice.text" x="422" y="66" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">( ① , ② , ③ )</text>
  <text id="slot.calc1.text" x="52" y="128" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">① 658 - 264 = 394</text>
  <text id="slot.calc2.text" x="210" y="128" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">② 503 - 119 = 384</text>
  <text id="slot.calc3.text" x="370" y="128" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">③ 947 - 472 = 475</text>
  <text id="slot.compare.text" x="16" y="156" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">384&lt;394&lt;475</text>
  <text id="slot.conclusion.text" x="128" y="156" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">이므로 계산 결과가 가장 작은 것은 ②입니다.</text>

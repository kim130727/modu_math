  <text id="slot.top.title.text" x="42" y="30" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">71. 정현이가 자두와 배의 무게를 비교하려고 합니다. 알맞은 말을 선택하세요.</text>

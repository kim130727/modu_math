  <text id="slot.q1.text" x="24" y="36" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">59. 반직선을 읽는 방법에 대한 설명으로 옳은 것을 찾아 기호를 선택하세요.</text>
  <rect id="slot.box.bg.rect" x="92" y="75" width="708" height="133" fill="#DCD8F1" stroke="#111111" stroke-width="1.5" />
  <text id="slot.c1.text" x="115" y="107" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">㉠ 반직선은 두 점 중 어느 점을 먼저 읽어도 상관없습니다.</text>
  <text id="slot.c2.text" x="115" y="143" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">㉡ 반직선 ㄴㄱ은 반직선 ㄴㄱ이라고 읽을 수 있습니다.</text>
  <text id="slot.c3.text" x="115" y="179" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">㉢ 반직선은 반드시 시작점을 먼저 읽습니다.</text>
  <text id="slot.choice.text" x="639" y="255" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">( ㉠ , ㉡ , ㉢ )</text>

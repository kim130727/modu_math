  <text id="slot.choice.1.text" x="38" y="431" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">① 이 분식집은 다음 주에 우동의 재료보다 떡국의 재료를 더 많이 준비해야 합니다.</text>
  <text id="slot.choice.2.text" x="38" y="492" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">② 라면은 국수보다 60그릇 더 많이 팔았습니다.</text>

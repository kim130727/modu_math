  <text id="slot.qtext1.text" x="95" y="26" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">어느 분식집에서 일주일 동안 팔린 음식의 수를 그림그래프로 나타내었습니다.</text>
  <text id="slot.qtext2.text" x="24" y="58" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">바르게 설명한 것을 고르세요.</text>

  <text id="slot.q1.text" x="45" y="41" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">79. 정국이는 반 학생들이 생일에 받고 싶은 선물을 조사하여 표로 나타냈습니다.</text>
  <text id="slot.q2.text" x="45" y="74" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">받고 싶은 학생 수가 많은 선물부터 순서대로 나열한 것을 고르세요.</text>
  <text id="slot.table.title.text" x="298" y="115" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">생일에 받고 싶은 선물별 학생 수</text>
  <text id="slot.opt1.text" x="40" y="246" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">① 휴대전화, 게임기, 책, 옷</text>

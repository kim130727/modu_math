  <text id="slot.q1.text" x="14" y="30" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">□ 2. 은우가 가위, 풀, 지우개의 무게를 다음과 같이 비교하였습니다. 가위, 풀,</text>
  <text id="slot.q2.text" x="35" y="63" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">지우개 중 가장 무거운 것은 어느 것인가요?</text>
  <rect id="slot.person.rect" x="70" y="96" width="110" height="110" fill="#ffffff" stroke="#111111" stroke-width="1.5" />
  <rect id="slot.box.rect" x="258" y="81" width="412" height="162" fill="#ffffff" stroke="#111111" stroke-width="1.5" />
  <text id="slot.person_name.text" x="108" y="227" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">은우</text>
  <text id="slot.box_text1.text" x="323" y="106" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">가위와 풀을 양손에 각각 들면</text>
  <text id="slot.box_text2.text" x="294" y="140" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">가위를 든 손에 힘이 더 많이 들고,</text>
  <text id="slot.box_text3.text" x="296" y="174" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">풀과 지우개를 양손에 각각 들면</text>
  <text id="slot.box_text4.text" x="297" y="208" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">풀을 든 손에 힘이 더 많이 들어.</text>
  <text id="slot.choices.text" x="600" y="258" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">( 가위 , 풀 , 지우개 )</text>

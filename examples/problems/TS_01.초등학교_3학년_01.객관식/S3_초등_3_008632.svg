  <metadata><problem_id>S3_초등_3_008632</problem_id></metadata>
  <rect x="0" y="0" width="760" height="500" fill="#FFFFFF" />
  <rect id="slot.q.box.rect" x="14" y="10" width="16" height="16" fill="none" stroke="#333333" stroke-width="1.5" />
  <text id="slot.q.number.text" x="38" y="28" max_width="632" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">3.</text>
  <text id="slot.q.text.text" x="82" y="28" max_width="632" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">나눗셈 중에서 나머지가 다른 하나를 고르세요.</text>
  <text id="slot.choice.1.text" x="26" y="86" max_width="632" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">① 39 ÷ 3</text>
  <text id="slot.choice.2.text" x="327" y="86" max_width="632" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">② 17 ÷ 4</text>
  <text id="slot.choice.3.text" x="580" y="86" max_width="632" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">③ 16 ÷ 5</text>
  <text id="slot.choice.4.text" x="26" y="131" max_width="632" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">④ 31 ÷ 6</text>
  <text id="slot.choice.5.text" x="327" y="131" max_width="632" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">⑤ 27 ÷ 2</text>
  <text id="slot.ans.text" x="26" y="190" max_width="632" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="22">(정답) ①</text>
  <text id="slot.exp.text" x="26" y="230" max_width="632" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="22">(해설)</text>
  <text id="slot.exp1.text" x="26" y="270" max_width="632" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="20">① 39 ÷ 3 = 13이므로 나머지가 0입니다.</text>
  <text id="slot.exp2.text" x="26" y="305" max_width="632" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="20">② 17 ÷ 4 = 4···1이므로 나머지가 1입니다.</text>
  <text id="slot.exp3.text" x="26" y="340" max_width="632" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="20">③ 16 ÷ 5 = 3···1이므로 나머지가 1입니다.</text>
  <text id="slot.exp4.text" x="26" y="375" max_width="632" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="20">④ 31 ÷ 6 = 5···1이므로 나머지가 1입니다.</text>
  <text id="slot.exp5.text" x="26" y="410" max_width="632" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="20">⑤ 27 ÷ 2 = 13···1이므로 나머지가 1입니다.</text>
  <text id="slot.concl.text" x="26" y="445" max_width="632" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="20">따라서 나머지가 다른 하나는 ① 39 ÷ 3입니다.</text>
</svg>

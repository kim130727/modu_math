  <text id="slot.q1.text" x="10" y="28" max_width="832" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">29. 가와 나는 규칙에 따라 원을 그린 것입니다. 알맞은 것을 선택해 두 모양을 그린 규칙의 같은 점과 다른 점을 설명해 보세요.</text>
  <text id="slot.label.ga.text" x="232" y="82" max_width="832" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">가</text>
  <text id="slot.label.na.text" x="516" y="82" max_width="832" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">나</text>
  <text id="slot.desc1.text" x="10" y="310" max_width="832" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">(2) 다른 점: ( 가, 나)는 원의 중심을 옮겨 가며 그렸고,( 가, 나)는 원의 중심이 모두 같게 그렸습니다.</text>
  <text id="slot.desc2.text" x="10" y="386" max_width="832" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">(2) 다른 점: 가는 원의 중심을 옮겨 가며 그렸고, 나는 원의 중심이 모두 같게 그렸습니다.</text>

  <text id="slot.q1.text" x="6" y="26" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">□ 40. 그림과 같이 ㉠ 물병에 물을 가득 채운 후 ㉡ 물병에 옮겨 담아 ㉠ 물병과 ㉡ 물병의 들이를 비교하려고 합니다. 알맞은 말을 선택하세요.</text>
  <text id="slot.q2.text" x="4" y="306" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="30">들이가 더 많은 것은 ( ㉠ 물병, ㉡ 물병 )입니다.</text>

  <text id="slot.q1.text" x="20" y="42" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">□ 98. 중기네 반 학생들이 좋아하는 민속놀이를 조사하여 표 나타내었습니다.</text>
  <text id="slot.q2.text" x="20" y="78" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">좋아하는 학생이 가장 많은 민속놀이와 가장 적은 민속놀이를 바르게</text>
  <text id="slot.q3.text" x="20" y="114" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">나열한 것을 고르세요.</text>

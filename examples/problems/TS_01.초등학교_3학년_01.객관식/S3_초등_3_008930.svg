  <text id="slot.choice2.text" x="512" y="340" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">② 그네타기, 씨름하기</text>
  <text id="slot.choice3.text" x="24" y="384" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">③ 널뛰기, 그네타기</text>

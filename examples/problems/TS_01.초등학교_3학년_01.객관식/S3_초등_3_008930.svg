  <text id="slot.ex2.text" x="40" y="506" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">8&gt;7&gt;6&gt;4이므로 좋아하는 학생이 가장 많은 민속놀이부터 순서대로 쓰면 널뛰기,</text>

  <text id="slot.speech.text" x="305" y="88" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28" data-raw-text="주스병과 물병에 물을 가득 채운 후 모양과
크기가 같은 그릇에 옮겨 담아 비교해야지.">

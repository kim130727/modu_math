  <text id="slot.q.text1.text" x="60" y="22" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">서진이네 학교 3학년 학생들이 좋아하는 색깔을 조사하여 표로 나타내었</text>
  <text id="slot.q.text2.text" x="60" y="58" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">습니다. 초록색을 좋아하는 학생 수가 빨간색을 좋아하는 학생 수의 3배일</text>
  <text id="slot.q.text3.text" x="60" y="94" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">때, 가장 많은 남학생이 좋아하는 색깔은 무엇인가요?</text>

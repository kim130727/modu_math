  <text id="slot.q1.text" x="10" y="18" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">□ 1. 민정이네 냉장고에 사과주스가 3 L 50 mL, 오렌지주스가 3500 mL, 포도주스가 5 L와 30 mL 있습니다. 사과주스, 오렌지주스, 포도주스 중 가장 적은 것은 어느 것인가요?</text>
  <text id="slot.choice.text" x="480" y="112" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">（사과주스, 오렌지주스, 포도주스）</text>
</svg>

  <text id="slot.q1.text" x="14" y="28" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">□ 50.  하은이네 반과 소울이네 반은 함께 현장 체험 학습을 가려고 학생들이 가고 싶어</text>
  <text id="slot.q2.text" x="42" y="64" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">하는 장소를 조사하여 표로 나타냈습니다. 하은이네 반과 소울이네 반이 어디</text>
  <text id="slot.q3.text" x="42" y="100" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">로 현장 체험 학습을 가면 좋을지 바르게 말한 사람을 선택해 보세요.</text>
  <text id="slot.table_title.text" x="268" y="160" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">현장 체험 학습으로 가고 싶어 하는 장소</text>

  <text id="slot.l2.text" x="21.72" y="114.22" max_width="852" fill="#222222" font-family="Malgun Gothic" font-size="32" text-anchor="start" data-semantic-role="instruction">다음과 같이 (대분수) ÷ (자연수)를 만들려고 합니다.</text>

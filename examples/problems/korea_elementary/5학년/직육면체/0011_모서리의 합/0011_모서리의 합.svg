  <text id="slot.inst_1.text" x="45" y="36" max_width="480" fill="#222222" font-family="Malgun Gothic" font-size="17" text-anchor="start" data-semantic-role="instruction">모든 면이 정사각형이고 한 면의 넓이가 8 cm²인 사각기둥이 있습니다.</text>
  <text id="slot.inst_2.text" x="45" y="64" max_width="480" fill="#222222" font-family="Malgun Gothic" font-size="17" text-anchor="start" data-semantic-role="instruction">[보기]는 이 사각기둥에서 ㄴ을 각뿔의 꼭짓점으로 하는 삼각뿔 모양을</text>
  <text id="slot.inst_3.text" x="45" y="92" max_width="480" fill="#222222" font-family="Malgun Gothic" font-size="17" text-anchor="start" data-semantic-role="instruction">자른 것입니다.</text>

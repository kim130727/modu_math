  <text id="slot.q_1.text" x="48" y="383" max_width="480" fill="#222222" font-family="Malgun Gothic" font-size="17" text-anchor="start" data-semantic-role="instruction">[보기]와 같은 방법으로 처음 사각기둥에서 각각 꼭짓점 B, O, D,</text>
  <text id="slot.q_2.text" x="48" y="412" max_width="480" fill="#222222" font-family="Malgun Gothic" font-size="17" text-anchor="start" data-semantic-role="instruction">F을 각뿔의 꼭젓점으로 하는 삼각뿔 모양 4개를 자르려고 합니다. 가장</text>
  <text id="slot.q_3.text" x="48" y="441" max_width="480" fill="#222222" font-family="Malgun Gothic" font-size="17" text-anchor="start" data-semantic-role="instruction">큰 삼각뿔 모양이 되도록 모두 잘랐을 때 자르고 남은 도형의 모든</text>
  <text id="slot.q_4.text" x="48" y="470" max_width="480" fill="#222222" font-family="Malgun Gothic" font-size="17" text-anchor="start" data-semantic-role="instruction">모서리의 길이의 합은 몇 cm입니까?</text>

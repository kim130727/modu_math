  <text id="slot.q1.text" x="29" y="60" max_width="852" fill="#222222" font-family="Malgun Gothic" font-size="31" text-anchor="start" data-semantic-role="instruction">여러 가지 크기의 정사각형을 겹치지 않게 붙여 다음과</text>
  <text id="slot.q2.text" x="29" y="104" max_width="852" fill="#222222" font-family="Malgun Gothic" font-size="31" text-anchor="start" data-semantic-role="instruction">같은 직사각형 모양도형을 만들었습니다. 색칠한 정사각형의</text>
  <text id="slot.q3.text" x="29" y="148" max_width="852" fill="#222222" font-family="Malgun Gothic" font-size="31" text-anchor="start" data-semantic-role="instruction">한 변의 길이가 15cm일 때, 직사각형 모양도형의</text>
  <text id="slot.q4.text" x="29" y="192" max_width="852" fill="#222222" font-family="Malgun Gothic" font-size="31" text-anchor="start" data-semantic-role="instruction">네 변의 길이의 합은 몇 cm입니까?</text>
  <text id="slot.q5.text" x="29" y="236" max_width="852" fill="#222222" font-family="Malgun Gothic" font-size="31" text-anchor="start" data-semantic-role="instruction">(각 가로와 세로 정사각형의 크기는 같습니다.)</text>
  <text id="slot.label_g.text" x="180.59975" y="342.61462" max_width="852" fill="#222222" font-family="Malgun Gothic" font-size="42" text-anchor="start" data-semantic-role="label">ㄱ</text>
  <text id="slot.label_n.text" x="658.59975" y="342.61462" max_width="852" fill="#222222" font-family="Malgun Gothic" font-size="42" text-anchor="start" data-semantic-role="label">ㄴ</text>
  <text id="slot.label_r.text" x="180.59975" y="654.6146200000001" max_width="852" fill="#222222" font-family="Malgun Gothic" font-size="42" text-anchor="start" data-semantic-role="label">ㄹ</text>

  <text id="slot.p1.text" x="50" y="80" max_width="872" fill="#000000" font-family="sans-serif" font-size="24" text-anchor="start">바둑돌 통에 검은색 바둑돌 374개와 흰색 바둑돌 558개가 있었습니다.</text>

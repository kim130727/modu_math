  <text id="slot.t1.text" x="6" y="34" max_width="639" fill="#222222" font-family="Malgun Gothic" font-size="17" text-anchor="start">주득이네 학교 3학년 학생을 청팀과 백팀으로 나누어 콩주머니 던지기 경기를 했습니다.</text>
  <text id="slot.t2.text" x="6" y="62" max_width="639" fill="#222222" font-family="Malgun Gothic" font-size="17" text-anchor="start">청팀과 백팀 중 어느 쪽이 콩주머니를 몇 개 더 넣었는지 식과 답을 구하시오.</text>

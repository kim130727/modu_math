<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500">
  <rect x="0" y="0" width="1000" height="500" fill="#FFFFFF" />
  <text id="slot.t1.text" x="64" y="72" max_width="872" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="26">국어나 수학을 좋아하는 학생 780명 중에서 국어를 좋아하는 학생이 621명,</text>
  <text id="slot.t2.text" x="64" y="128" max_width="872" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="26">수학을 좋아하는 학생이 348명입니다. 국어와 수학을 모두 좋아하는 학생은</text>
  <text id="slot.t3.text" x="64" y="184" max_width="872" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="26">몇 명입니까?</text>
</svg>

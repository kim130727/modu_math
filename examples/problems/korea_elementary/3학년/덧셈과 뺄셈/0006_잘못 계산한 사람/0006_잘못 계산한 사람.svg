  <text id="slot.jy.text" x="24" y="132" max_width="639" fill="#222222" font-family="Malgun Gothic" font-size="17" text-anchor="start">• 지은: 800에서 300을 빼고, 75에서 28을 뺀 다음 두 결과를 더했어.</text>
  <text id="slot.gw.text" x="24" y="174" max_width="639" fill="#222222" font-family="Malgun Gothic" font-size="17" text-anchor="start">• 건우: 800에서 300을 빼고 75에서 30을 뺀 다음 2를 빼서 결과를 더했어.</text>

  <text id="slot.i1.text" x="6" y="34" max_width="639" fill="#222222" font-family="Malgun Gothic" font-size="17" text-anchor="start">지은이와 건우가 875-328을 계산한 방법을 대화로 나타낸 것입니다. 잘못 계산한</text>

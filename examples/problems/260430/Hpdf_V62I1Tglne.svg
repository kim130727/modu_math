  <text id="slot.q1.text" x="10" y="30" max_width="434" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">사람의 뼈의 수는 어릴수록 많고 어른이 되어</text>
  <text id="slot.q2.text" x="10" y="69" max_width="434" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">가면서 줄어든다고 합니다. 아빠의 뼈와 유라</text>
  <text id="slot.q3.text" x="10" y="108" max_width="434" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">의 뼈의 수의 합은 486개이며, 유라의 뼈는 아</text>
  <text id="slot.q4.text" x="10" y="147" max_width="434" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">빠의 뼈보다 74개 더 많습니다. 또한 동생의</text>
  <text id="slot.q5.text" x="10" y="186" max_width="434" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">뼈는 유라의 뼈보다 60개 더 많습니다. 유라의</text>
  <text id="slot.a1.text" x="128" y="287" max_width="434" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">유라 (                )</text>
  <text id="slot.a2.text" x="128" y="326" max_width="434" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">동생 (                )</text>
  <text id="slot.q6.text" x="10" y="225" max_width="434" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">뼈의 수와 동생의 뼈의 수를 각각 구하시오.</text>

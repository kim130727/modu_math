  <text id="slot.q1.text" x="18" y="40" max_width="452" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">
    <tspan x="18" dy="0">각 자리의 숫자가 모두 다른 세 자리 수 ㉠㉡㉢에</tspan>
    <tspan x="18" dy="1.2em">475를 더했더니 자리의 숫자가 모두 같았습니다.</tspan>
    <tspan x="18" dy="1.2em">이와 같은 세 자리 수 ㉠㉡㉢은 모두 몇 개입니까?</tspan>
  </text>

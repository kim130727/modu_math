<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="568" height="353" viewBox="0 0 568 353">
  <rect x="0" y="0" width="568" height="353" fill="#FFFFFF" />
  <text id="slot.q1.text" x="20" y="40" max_width="440" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">민하와 하리는 0부터 9까지의 수 카드를 5장</text>
  <text id="slot.q2.text" x="20" y="84" max_width="440" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">씩 똑같이 나누어 가졌습니다. 민하가 수 카드</text>
  <text id="slot.q3.text" x="20" y="128" max_width="440" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">로 만든 가장 큰 네 자리 수는 8742이고, 가장</text>
  <text id="slot.q4.text" x="20" y="172" max_width="440" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">작은 네 자리 수는 2047입니다. 두 사람이 만</text>
  <text id="slot.q5.text" x="20" y="216" max_width="440" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">들 수 있는 가장 큰 세 자리 수의 합을 구하시오.</text>
  <text id="slot.q6.text" x="20" y="260" max_width="440" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">(단, 수를 만들 때 수 카드를 한 번씩만 사용합니다.)</text>
</svg>

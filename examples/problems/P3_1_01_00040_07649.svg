  <text id="slot.question.text" x="48" y="54" fill="#202124" font-family="Noto Sans KR" font-size="24" max_width="804" data-slot-kind="text_box" data-box-x="48" data-box-y="30" data-box-width="804" data-box-height="120" data-line-height="1.5" text-anchor="start" data-raw-text="경진이네 학교 3학년 학생은 남학생이 87명, 여학생이 66명입니다. 3학년 학생 모두에게 연필을 2자루씩 나누어 주려고 합니다. 학생들에게 나누어 주기 위해 필요한 연필은 모두 몇 자루입니까?">
    <tspan x="48" y="54">경진이네 학교 3학년 학생은 남학생이 87명, 여학생이 66명입니다. 3학년</tspan>
    <tspan x="48" y="90">학생 모두에게 연필을 2자루씩 나누어 주려고 합니다. 학생들에게 나누어 주기</tspan>
    <tspan x="48" y="126">위해 필요한 연필은 모두 몇 자루입니까?</tspan>
  </text>

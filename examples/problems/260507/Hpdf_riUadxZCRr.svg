  <text id="slot.q1.text" x="24" y="40" max_width="776" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="35">긴 변이 12 cm, 짧은 변이 3 cm인 직사각형</text>
  <text id="slot.q2.text" x="24" y="100" max_width="776" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="35">모양의 종이테이프 3장을 2 cm씩 겹치게 이</text>
  <text id="slot.q3.text" x="24" y="160" max_width="776" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="35">어 붙여서 직사각형을 만들었습니다. 만든 직</text>
  <text id="slot.q4.text" x="24" y="220" max_width="776" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="35">사각형의 네 변의 길이의 합은 몇 cm입니까?</text>

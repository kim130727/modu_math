  <text id="slot.q3.text" x="16" y="160" max_width="777" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="35" text-anchor="start">은 쪽의 각이 직각인 시각은 모두 몇 번 있습니</text>

  <text id="slot.q1.text" x="12" y="40" max_width="772" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="35">네 변의 길이의 합이 20 cm인 작은 직사각형</text>
  <text id="slot.q2.text" x="12" y="100" max_width="772" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="35">8개를 그림과 같이 겹치지 않게 이어 붙였더니</text>
  <text id="slot.q3.text" x="12" y="160" max_width="772" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="35">네 변의 길이의 합이 64 cm인 큰 직사각형이</text>
  <text id="slot.q4.text" x="12" y="220" max_width="772" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="35">되었습니다. 가장 작은 직사각형 한 개의 짧은</text>

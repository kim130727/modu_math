  <text id="slot.q1.text" x="15" y="30" max_width="765" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="35">일정한 간격으로 점이 찍힌 종이 위에 3개의</text>
  <text id="slot.q2.text" x="15" y="80" max_width="765" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="35">점을 꼭짓점으로 하는 직각삼각형을 그리려고</text>
  <text id="slot.q3.text" x="15" y="130" max_width="765" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="35">합니다. 그릴 수 있는 직각삼각형은 모두 몇 개</text>
  <text id="slot.q4.text" x="15" y="180" max_width="765" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="35">입니까? (단, 모양과 크기가 같아도 위치가 다</text>
  <text id="slot.q5.text" x="15" y="230" max_width="765" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="35">르면 다른 것으로 봅니다.)</text>

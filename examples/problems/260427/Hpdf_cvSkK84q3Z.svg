<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="440" viewBox="0 0 600 440">
  <rect x="0" y="0" width="600" height="440" fill="#FFFFFF" />
  <text id="slot.q1.text" x="8" y="30" max_width="472" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">
    <tspan x="8" dy="0">대화를 보고 건우가 가진 액자의 한 변은</tspan>
    <tspan x="8" dy="1.2em"> 몇 cm인지 구하시오.</tspan>
  </text>
  <text id="slot.msg1.text" x="112" y="134" max_width="472" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="22">
    <tspan x="112" dy="0">나는 가로가 8 cm, 세로가 10 cm인</tspan>
    <tspan x="112" dy="1.2em">직사각형 모양의 액자를 가지고 있어.</tspan>
  </text>
  <text id="slot.msg2.text" x="112" y="242" max_width="472" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="22">
    <tspan x="112" dy="0">헉! 내가 가진 액자와 네 변의 길이의 합</tspan>
    <tspan x="112" dy="1.2em">이 같네. 내 액자는 정사각형 모양이지.</tspan>
  </text>
  <text id="slot.msg3.text" x="112" y="358" max_width="472" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="22">
    <tspan x="112" dy="0">그럼 네가 가진 액자의 한 변은 몇 cm</tspan>
    <tspan x="112" dy="1.2em">야?</tspan>
  </text>
  <text id="slot.name1.text" x="0" y="130" max_width="472" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="24">〈다희〉</text>
  <text id="slot.name2.text" x="480" y="230" max_width="472" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="24">〈건우〉</text>
  <text id="slot.name3.text" x="-2" y="350" max_width="472" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="24">〈다희〉</text>

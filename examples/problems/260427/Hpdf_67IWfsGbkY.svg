<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="294" viewBox="0 0 800 294">
  <rect x="0" y="0" width="800" height="294" fill="#FFFFFF" />
  <text id="slot.q1.text" x="18" y="34" max_width="672" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="24" text-anchor="start">(가), (나), (다) 세 사람은 구슬 게임을 합니다.</text>
  <text id="slot.q2.text" x="18" y="70" max_width="672" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="24" text-anchor="start">게임에서 진 사람은 이긴 사람이 갖고 있는 수만큼 구슬을 주기로 하였습니다.</text>
  <text id="slot.q3.text" x="18" y="106" max_width="672" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="24" text-anchor="start">첫 번째 게임에서 (나)는 (가)와 (다)에게 졌습니다.</text>
  <text id="slot.q4.text" x="18" y="142" max_width="672" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="24" text-anchor="start">두 번째 게임에서 (가)는 (나)와 (다)에게 졌습니다.</text>
  <text id="slot.q5.text" x="18" y="178" max_width="672" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="24" text-anchor="start">두 번의 게임이 끝난 후 세 사람이 가지고 있는 구슬은 각각 240개로 같았습니다.</text>
  <text id="slot.q6.text" x="18" y="214" max_width="672" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="24" text-anchor="start">게임을 시작하기 전 (나)가 가지고 있던 구슬은 몇 개입니까?</text>
</svg>

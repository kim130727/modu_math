<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="560" height="170" viewBox="0 0 560 170">
  <rect x="0" y="0" width="560" height="170" fill="#FFFFFF" />
  <text id="slot.q1.text" x="10" y="32" max_width="432" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28" text-anchor="start">
    <tspan x="10" dy="0">색종이를 국진이는 456장, 수지는 372장 가지</tspan>
    <tspan x="10" dy="1.2em">고 있습니다. 국진이와 수지가 가진 색종이의</tspan>
    <tspan x="10" dy="1.2em">수가 같아지려면 국진이는 수지에게 색종이를</tspan>
    <tspan x="10" dy="1.2em">몇 장 주어야 합니까?</tspan>
  </text>
</svg>

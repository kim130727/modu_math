<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="750" height="380" viewBox="0 0 750 380">
  <rect x="0" y="0" width="750" height="380" fill="#FFFFFF" />
  <text id="slot.q1.text" x="12" y="34" max_width="622" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">
    <tspan x="12" dy="0">1부터 9까지의 숫자를 모두 한 번씩만 사용하여</tspan>
    <tspan x="12" dy="1.2em"> 3개의 세 자리 수 529, ㉠, ㉡를 만들려고 합니다.</tspan>
    <tspan x="12" dy="1.2em">세 수가 다음을 모두 만족시킬 때, 가장 작은 수 ㉠를 구하시오.</tspan>
  </text>
  <rect id="slot.box.rect" x="12" y="148" width="524" height="162" fill="none" stroke="#777777" stroke-width="1.4" rx="6" ry="6" />
  <text id="slot.b1.text" x="38" y="206" max_width="622" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">• ㉠는 ㉡보다 작은 수입니다.</text>
  <text id="slot.b2.text" x="38" y="252" max_width="622" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">• 세 수의 합과 1000의 차가 가장 작습니다.</text>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="660" viewBox="0 0 800 660">
  <rect x="0" y="0" width="800" height="660" fill="#FFFFFF" />
  <text id="slot.stem.l1.text" x="16" y="52" max_width="672" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">소민이는 500원짜리 동전만 몇 개를 가지고</text>
  <text id="slot.stem.l2.text" x="16" y="102" max_width="672" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">문구점에 갔습니다. 다음 가격이 제시된 물건</text>
  <text id="slot.stem.l3.text" x="16" y="152" max_width="672" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">중 3가지를 각각 1개씩 사고 받은 거스름돈은</text>
  <text id="slot.stem.l4.text" x="16" y="202" max_width="672" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">10원짜리 동전 3개였습니다. 소민이가 산 물</text>
  <text id="slot.stem.l5.text" x="16" y="252" max_width="672" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">건 중 가장 비싼 것은 무엇입니까?</text>
  <rect id="slot.price.box.rect" x="16" y="300" width="768" height="340" fill="none" stroke="#9A9A9A" stroke-width="2" rx="10" ry="10" />
  <text id="slot.price.left.1.text" x="56" y="368" max_width="672" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">지우개 1개: 340원</text>
  <text id="slot.price.left.2.text" x="56" y="436" max_width="672" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">얌체공 1개: 250원</text>
  <text id="slot.price.left.3.text" x="56" y="504" max_width="672" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">각도기 1개: 430원</text>
  <text id="slot.price.right.1.text" x="480" y="368" max_width="672" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">자 1개: 290원</text>
  <text id="slot.price.right.2.text" x="480" y="436" max_width="672" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">풀 1개: 470원</text>
  <text id="slot.price.right.3.text" x="480" y="504" max_width="672" fill="#111111" font-family="Noto Sans KR, sans-serif" font-size="28">칼 1개: 520원</text>
</svg>

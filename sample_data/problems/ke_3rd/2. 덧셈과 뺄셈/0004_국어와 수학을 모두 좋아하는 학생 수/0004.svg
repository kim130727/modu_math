<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500">
  <rect x="0" y="0" width="1000" height="500" fill="#F6F6F6" />
  <text id="t1" x="50" y="80" text-anchor="start" fill="#000000" stroke="none" stroke-width="1" font-family="sans-serif" font-size="24">국어나 수학을 좋아하는 학생 780명 중에서 국어를 좋아하는 학생이 621명,</text>
  <text id="t2" x="50" y="120" text-anchor="start" fill="#000000" stroke="none" stroke-width="1" font-family="sans-serif" font-size="24">수학을 좋아하는 학생이 348명입니다. 국어와 수학을 모두 좋아하는 학생은</text>
  <text id="t3" x="50" y="160" text-anchor="start" fill="#000000" stroke="none" stroke-width="1" font-family="sans-serif" font-size="24">몇 명입니까?</text>
</svg>

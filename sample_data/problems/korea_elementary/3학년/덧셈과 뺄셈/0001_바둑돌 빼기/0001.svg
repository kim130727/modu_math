<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500">
  <rect x="0" y="0" width="1000" height="500" fill="#F6F6F6" />
  <text id="p1" x="50" y="80" text-anchor="start" fill="#000000" stroke="none" stroke-width="1" font-family="sans-serif" font-size="24">바둑돌 통에 검은색 바둑돌 374개와 흰색 바둑돌 558개가 있었습니다.</text>
  <text id="p2" x="50" y="180" text-anchor="start" fill="#000000" stroke="none" stroke-width="1" font-family="sans-serif" font-size="24">그중에서 몇 개를 뺐더니 463개가 남았습니다.</text>
  <text id="p3" x="50" y="260" text-anchor="start" fill="#000000" stroke="none" stroke-width="1" font-family="sans-serif" font-size="24">뺀 바둑돌은 몇 개입니까?</text>

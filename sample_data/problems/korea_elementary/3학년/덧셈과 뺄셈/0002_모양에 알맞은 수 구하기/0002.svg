  <text id="t1" x="50" y="80" text-anchor="start" fill="#000000" stroke="none" stroke-width="1" font-family="sans-serif" font-size="24">같은 모양은 같은 수를 나타냅니다. ■와 ▲에 알맞은 수의 차를 구하시오.</text>
  <text id="eq1" x="80" y="200" text-anchor="start" fill="#000000" stroke="none" stroke-width="1" font-family="serif" font-size="28" data-formula="800 - 347 + ■ = 650" class="formula-placeholder">800 - 347 + ■ = 650</text>
  <text id="eq2" x="80" y="300" text-anchor="start" fill="#000000" stroke="none" stroke-width="1" font-family="serif" font-size="28" data-formula="543 - ▲ = ■" class="formula-placeholder">543 - ▲ = ■</text>

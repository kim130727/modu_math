<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600">
  <rect x="0" y="0" width="1000" height="600" fill="#F6F6F6" />
  <text id="t1" x="50" y="80" text-anchor="start" fill="#000000" stroke="none" stroke-width="1" font-family="sans-serif" font-size="24">5장의 수 카드 중에서 3장을 골라 한 번씩만 사용하여 세 자리 수를 만들었습니다.</text>
  <text id="t2" x="50" y="120" text-anchor="start" fill="#000000" stroke="none" stroke-width="1" font-family="sans-serif" font-size="24">세 자리 수 중에서 십의 자리 숫자가 8인 두 번째로 큰 수와 일의 자리 숫자가</text>
  <text id="t3" x="50" y="160" text-anchor="start" fill="#000000" stroke="none" stroke-width="1" font-family="sans-serif" font-size="24">8인 두 번째로 작은 수의 차는 얼마입니까?</text>
  <rect id="card_box_0" fill="white" stroke="black" stroke-width="1" x="150" y="250" width="80" height="100" rx="5" ry="5" />
  <text id="card_text_0" x="190" y="310" text-anchor="middle" fill="#000000" stroke="none" stroke-width="1" font-family="sans-serif" font-size="40">2</text>
  <rect id="card_box_1" fill="white" stroke="black" stroke-width="1" x="250" y="250" width="80" height="100" rx="5" ry="5" />
  <text id="card_text_1" x="290" y="310" text-anchor="middle" fill="#000000" stroke="none" stroke-width="1" font-family="sans-serif" font-size="40">0</text>
  <rect id="card_box_2" fill="white" stroke="black" stroke-width="1" x="350" y="250" width="80" height="100" rx="5" ry="5" />
  <text id="card_text_2" x="390" y="310" text-anchor="middle" fill="#000000" stroke="none" stroke-width="1" font-family="sans-serif" font-size="40">4</text>
  <rect id="card_box_3" fill="white" stroke="black" stroke-width="1" x="450" y="250" width="80" height="100" rx="5" ry="5" />
  <text id="card_text_3" x="490" y="310" text-anchor="middle" fill="#000000" stroke="none" stroke-width="1" font-family="sans-serif" font-size="40">6</text>
  <rect id="card_box_4" fill="white" stroke="black" stroke-width="1" x="550" y="250" width="80" height="100" rx="5" ry="5" />
  <text id="card_text_4" x="590" y="310" text-anchor="middle" fill="#000000" stroke="none" stroke-width="1" font-family="sans-serif" font-size="40">8</text>
</svg>

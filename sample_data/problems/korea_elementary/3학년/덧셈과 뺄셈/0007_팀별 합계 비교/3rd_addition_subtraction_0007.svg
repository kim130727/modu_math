  <text id="t1" fill="#222222" font-family="Malgun Gothic" font-size="17px" font-weight="normal" x="6" y="34" text-anchor="start">주득이네 학교 3학년 학생을 청팀과 백팀으로 나누어 콩주머니 던지기 경기를 했습니다.</text>

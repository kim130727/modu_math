<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600">
  <rect x="0" y="0" width="1000" height="600" fill="#F6F6F6" />
  <text id="t1" x="50" y="80" text-anchor="start" fill="#000000" stroke="none" stroke-width="1" font-family="sans-serif" font-size="24">오른쪽 뺄셈식에서 같은 문자는 같은 숫자를 나타냅니다.</text>
  <text id="t2" x="50" y="140" text-anchor="start" fill="#000000" stroke="none" stroke-width="1" font-family="sans-serif" font-size="24">서로 다른 숫자 ㉠, ㉡, ㉢의 합을 구하시오.</text>
  <text id="v1" x="450" y="250" text-anchor="start" fill="#000000" stroke="none" stroke-width="1" font-family="sans-serif" font-size="40">  ㉠ ㉡ 2</text>
  <text id="v2" x="450" y="320" text-anchor="start" fill="#000000" stroke="none" stroke-width="1" font-family="sans-serif" font-size="40">- 1 ㉠ ㉢</text>
  <rect id="v3_line" fill="black" stroke="#000000" stroke-width="1" x="450" y="345" width="220" height="3" />
  <text id="v4" x="450" y="410" text-anchor="start" fill="#000000" stroke="none" stroke-width="1" font-family="sans-serif" font-size="40">  3 1 4</text>
</svg>

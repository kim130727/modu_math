<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600">
  <rect x="0" y="0" width="1000" height="600" fill="#F6F6F6" />
  <text id="t1" x="50" y="60" text-anchor="start" fill="#000000" stroke="none" stroke-width="1" font-family="sans-serif" font-size="24">다음 가전제품 중에서 2개를 골라 소비전력의 합이 1000 W가 넘는</text>
  <text id="t2" x="50" y="100" text-anchor="start" fill="#000000" stroke="none" stroke-width="1" font-family="sans-serif" font-size="24">경우를 찾아 그 합을 구하시오.</text>
  <rect id="box_0" fill="white" stroke="black" stroke-width="1" x="100" y="200" width="200" height="150" rx="10" ry="10" />
  <text id="name_0" x="200" y="260" text-anchor="middle" fill="#000000" stroke="none" stroke-width="1" font-family="sans-serif" font-size="28">전기밥솥</text>
  <text id="val_0" x="200" y="310" text-anchor="middle" fill="#000000" stroke="none" stroke-width="1" font-family="sans-serif" font-size="32">500 W</text>
  <rect id="box_1" fill="white" stroke="black" stroke-width="1" x="350" y="200" width="200" height="150" rx="10" ry="10" />
  <text id="name_1" x="450" y="260" text-anchor="middle" fill="#000000" stroke="none" stroke-width="1" font-family="sans-serif" font-size="28">정수기</text>
  <text id="val_1" x="450" y="310" text-anchor="middle" fill="#000000" stroke="none" stroke-width="1" font-family="sans-serif" font-size="32">770 W</text>
  <rect id="box_2" fill="white" stroke="black" stroke-width="1" x="600" y="200" width="200" height="150" rx="10" ry="10" />
  <text id="name_2" x="700" y="260" text-anchor="middle" fill="#000000" stroke="none" stroke-width="1" font-family="sans-serif" font-size="28">모니터</text>
  <text id="val_2" x="700" y="310" text-anchor="middle" fill="#000000" stroke="none" stroke-width="1" font-family="sans-serif" font-size="32">150 W</text>
</svg>

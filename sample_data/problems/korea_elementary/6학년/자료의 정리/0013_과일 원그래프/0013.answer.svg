  <text id="q1" data-semantic-role="instruction" fill="#222222" font-family="Malgun Gothic" font-size="30px" font-weight="normal" x="14" y="44" text-anchor="start">준호네 학교 학생들이 좋아하는 과일을 조사한 원그래프입니다.</text>
  <text id="q2" data-semantic-role="instruction" fill="#222222" font-family="Malgun Gothic" font-size="30px" font-weight="normal" x="14" y="94" text-anchor="start">바나나를 좋아하는 학생이 60명이면 전체 학생 수는</text>
  <text id="q3" data-semantic-role="instruction" fill="#222222" font-family="Malgun Gothic" font-size="30px" font-weight="normal" x="14" y="142" text-anchor="start">몇 명인가요?</text>

  <text id="q1" data-semantic-role="instruction" fill="#222222" font-family="Malgun Gothic" font-size="31px" font-weight="normal" x="29" y="60" text-anchor="start">여러 가지 크기의 정사각형을 겹치지 않게 붙여 다음과</text>
  <text id="q2" data-semantic-role="instruction" fill="#222222" font-family="Malgun Gothic" font-size="31px" font-weight="normal" x="29" y="104" text-anchor="start">같은 직사각형 모양도형을 만들었습니다. 색칠한 정사각형의</text>
  <text id="q3" data-semantic-role="instruction" fill="#222222" font-family="Malgun Gothic" font-size="31px" font-weight="normal" x="29" y="148" text-anchor="start">한 변의 길이가 15cm일 때, 직사각형 모양도형의</text>
  <text id="q4" data-semantic-role="instruction" fill="#222222" font-family="Malgun Gothic" font-size="31px" font-weight="normal" x="29" y="192" text-anchor="start">네 변의 길이의 합은 몇 cm입니까?</text>
  <text id="q5" data-semantic-role="instruction" fill="#222222" font-family="Malgun Gothic" font-size="31px" font-weight="normal" x="29" y="236" text-anchor="start">(각 가로와 세로 정사각형의 크기는 같습니다.)</text>

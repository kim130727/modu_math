  <text id="q1" x="29" y="60" font-family="Malgun Gothic" font-size="31px" fill="#222222" font-weight="normal" text-anchor="start">여러 가지 크기의 정사각형을 겹치지 않게 놓아 다음과</text>
  <text id="q2" x="29" y="104" font-family="Malgun Gothic" font-size="31px" fill="#222222" font-weight="normal" text-anchor="start">같은 직사각형 ㄱㄴㄷㄹ을 만들었습니다. 색칠된 정사각</text>
  <text id="q3" x="29" y="148" font-family="Malgun Gothic" font-size="31px" fill="#222222" font-weight="normal" text-anchor="start">형의 한 변의 길이는 15cm일 때, 직사각형 ㄱㄴㄷㄹ의</text>
  <text id="q4" x="29" y="192" font-family="Malgun Gothic" font-size="31px" fill="#222222" font-weight="normal" text-anchor="start">네 변의 길이의 합은 몇 cm입니까? (단, 가장 작은 두</text>
  <text id="q5" x="29" y="236" font-family="Malgun Gothic" font-size="31px" fill="#222222" font-weight="normal" text-anchor="start">정사각형의 크기는 같습니다.)</text>

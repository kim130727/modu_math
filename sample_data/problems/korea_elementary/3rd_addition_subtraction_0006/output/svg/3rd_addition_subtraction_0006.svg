  <text id="i1" fill="#222222" font-family="Malgun Gothic" font-size="17px" font-weight="normal" x="6" y="34" text-anchor="start">지은이와 건우가 875-328을 계산한 방법을 대화로 나타낸 것입니다. 잘못 계산한</text>
  <text id="i2" fill="#222222" font-family="Malgun Gothic" font-size="17px" font-weight="normal" x="6" y="62" text-anchor="start">사람과 이유를 쓰세요.</text>
  <rect id="bubble" stroke="#666666" stroke-width="1.5" fill="none" font-family="Malgun Gothic" font-weight="normal" x="14" y="98" width="740" height="116" rx="10" ry="10" />
  <text id="jy" fill="#222222" font-family="Malgun Gothic" font-size="17px" font-weight="normal" x="24" y="132" text-anchor="start">• 지은: 800에서 300을 빼고, 75에서 28을 뺀 다음 두 결과를 더했어.</text>
  <text id="gw" fill="#222222" font-family="Malgun Gothic" font-size="17px" font-weight="normal" x="24" y="174" text-anchor="start">• 건우: 800에서 300을 빼고 75에서 30을 뺀 다음 2를 빼서 결과를 더했어.</text>
  <rect id="answer_text" data-semantic-role="answer_anchor" stroke="none" stroke-width="0" fill="none" font-family="Malgun Gothic" font-weight="normal" x="400" y="236" width="350" height="30" />

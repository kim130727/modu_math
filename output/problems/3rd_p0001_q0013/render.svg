<text x="36" y="64" font-size="30" font-family="Noto Sans KR, Arial, sans-serif"><tspan>영화가 오전 8시 30분에 처음 시작하여 2시간 05분 후에 끝났습니다. 다음 영화의 시작</tspan><tspan x="36" dy="38">시간은 끝난 시간의 25분 후입니다. 희서는 5번째로 시작하는 영화를 보기로 하였다면 몇</tspan><tspan x="36" dy="38">시 몇 분에 영화를 봅니까? (단, 매 영화가 끝난 후 25분 동안은 영화가 시작하지</tspan><tspan x="36" dy="38">않습니다.)</tspan></text>

<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ModuMath Editor MVP</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #d1d5db;
      --primary: #0f766e;
      --danger: #b91c1c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Pretendard", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 0%, #e2f6f5, var(--bg));
    }
    .wrap { min-height: 100vh; padding: 12px; }
    .main { display: grid; grid-template-rows: auto auto auto 1fr auto; gap: 10px; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 12px; overflow: auto; }
    h2 { margin: 0 0 8px; font-size: 14px; color: var(--muted); }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .grow { flex: 1 1 420px; }
    button {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      color: var(--text);
    }
    button.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      padding: 8px;
    }
    .tool-group {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 3px;
      border: 1px solid #e5e7eb;
      border-radius: 9px;
      background: #f9fafb;
    }
    .icon-btn {
      width: 36px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border-color: transparent;
      border-radius: 7px;
      background: transparent;
    }
    .icon-btn:hover {
      background: #eef6f5;
      border-color: #c9dcda;
    }
    .icon-btn.primary,
    .icon-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
    .icon-btn.danger:hover {
      background: #fef2f2;
      border-color: #fecaca;
      color: var(--danger);
    }
    .icon-btn svg {
      width: 19px;
      height: 19px;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      pointer-events: none;
    }
    textarea, input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      font-family: Consolas, monospace;
    }
    textarea { min-height: 180px; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 10px; min-height: 420px; }
    .svg-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: #fff;
      overflow: hidden;
      height: 72vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .svg-box svg {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      display: block;
      user-select: none;
      -webkit-user-select: none;
      -ms-user-select: none;
    }
    .svg-box, .svg-box svg text {
      user-select: none;
      -webkit-user-select: none;
      -ms-user-select: none;
    }
    .svg-box svg [id] { cursor: move; }
    .svg-box svg text[id] { pointer-events: bounding-box; }
    .svg-box svg rect[id] { pointer-events: all; }
    .svg-box svg circle[id],
    .svg-box svg line[id],
    .svg-box svg path[id],
    .svg-box svg polygon[id] { pointer-events: visiblePainted; }
    .svg-box svg .slot-selected { filter: drop-shadow(0 0 3px #0f766e); }
    .svg-box svg .pick-disabled { pointer-events: none; opacity: 0.35; }
    .svg-box svg .selection-bounds {
      fill: none;
      stroke: #0f766e;
      stroke-width: 1.5;
      stroke-dasharray: 5 3;
      pointer-events: none;
    }
    .svg-box svg .selection-bounds.canvas-selected {
      stroke: #2563eb;
      stroke-dasharray: 8 4;
    }
    .svg-box svg .selection-line {
      fill: none;
      stroke: #0f766e;
      stroke-width: 1.75;
      stroke-dasharray: 5 3;
      pointer-events: none;
    }
    .svg-box svg .selection-handle {
      fill: #ffffff;
      stroke: #0f766e;
      stroke-width: 1.5;
      cursor: pointer;
    }
    .svg-box svg .selection-handle[data-handle="n"],
    .svg-box svg .selection-handle[data-handle="s"] { cursor: ns-resize; }
    .svg-box svg .selection-handle[data-handle="e"],
    .svg-box svg .selection-handle[data-handle="w"] { cursor: ew-resize; }
    .svg-box svg .selection-handle[data-handle="nw"],
    .svg-box svg .selection-handle[data-handle="se"] { cursor: nwse-resize; }
    .svg-box svg .selection-handle[data-handle="ne"],
    .svg-box svg .selection-handle[data-handle="sw"] { cursor: nesw-resize; }
    .svg-box svg .selection-handle[data-handle="p1"],
    .svg-box svg .selection-handle[data-handle="p2"] { cursor: crosshair; }
    .svg-box svg .selection-handle[data-handle="c"] { cursor: move; fill: #0f766e; }
    .svg-box svg .selection-handle[data-handle="r"] { cursor: grab; fill: #f59e0b; stroke: #92400e; }
    .svg-box svg .table-adjust-handle {
      fill: none;
      stroke: #f59e0b;
      stroke-width: 7;
      stroke-opacity: 0.38;
      stroke-linecap: round;
    }
    .inline-text-editor {
      position: absolute;
      display: none;
      z-index: 3;
      min-width: 48px;
      border: 1px solid #0f766e;
      border-radius: 4px;
      padding: 2px 4px;
      background: #ffffff;
      color: #111827;
      box-shadow: 0 0 0 2px rgba(15, 118, 110, 0.12);
      font-family: "Segoe UI", "Pretendard", sans-serif;
      line-height: 1.2;
    }
    .marquee {
      position: absolute;
      border: 1px dashed #0f766e;
      background: rgba(15, 118, 110, 0.12);
      pointer-events: none;
      display: none;
      z-index: 2;
    }
    .log {
      white-space: pre-wrap;
      font-family: Consolas, monospace;
      font-size: 12px;
      color: #111;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: #fff;
    }
    .artifact-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    .artifact-grid textarea {
      min-height: 160px;
      font-size: 12px;
    }
    .err { color: var(--danger); }
    .ok { color: #047857; }
    .tree {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      max-height: 320px;
      overflow: auto;
      background: #fff;
    }
    .tree ul { list-style: none; margin: 0; padding-left: 14px; }
    .tree li { margin: 3px 0; }
    .tree .folder {
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-weight: 600;
      padding: 2px 4px;
      text-align: left;
      width: 100%;
    }
    .tree .folder:hover { background: #f8fafc; }
    .tree .folder::before {
      content: "▸";
      display: inline-block;
      margin-right: 4px;
      width: 12px;
    }
    .tree .folder.open::before { content: "▾"; }
    .tree .children.collapsed { display: none; }
    .tree .file-btn {
      border: none;
      background: transparent;
      padding: 2px 4px;
      border-radius: 6px;
      text-align: left;
      width: auto;
    }
    .tree .file-btn:hover { background: #ecfeff; }
    .tree .file-btn.active {
      background: #ccfbf1;
      color: #0f766e;
      font-weight: 700;
    }
    .tree-tools {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .tree-tools input { min-width: 0; }
    .tree-count {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }
    .wrap.powerpoint {
      height: 100vh;
      padding: 0;
      overflow: hidden;
      background: #eef1f5;
    }
    .ppt-shell {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-width: 960px;
    }
    .ppt-titlebar {
      height: 34px;
      display: grid;
      grid-template-columns: 280px 1fr 280px;
      align-items: center;
      gap: 12px;
      padding: 0 12px;
      background: #b7472a;
      color: #fff;
      font-size: 13px;
    }
    .ppt-titlebar .doc-name {
      text-align: center;
      font-weight: 600;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .ppt-titlebar input {
      height: 24px;
      border: 0;
      border-radius: 4px;
      padding: 3px 8px;
      background: rgba(255,255,255,0.18);
      color: #fff;
      font-family: inherit;
    }
    .ppt-titlebar input::placeholder { color: rgba(255,255,255,0.78); }
    .ppt-ribbon {
      display: flex;
      align-items: stretch;
      gap: 0;
      min-height: 92px;
      padding: 8px 10px;
      background: #ffffff;
      border-bottom: 1px solid #cfd4dc;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
    }
    .ribbon-group {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 12px;
      border-right: 1px solid #e5e7eb;
      position: relative;
    }
    .ribbon-group::after {
      content: attr(data-label);
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      text-align: center;
      font-size: 11px;
      color: #6b7280;
    }
    .ribbon-group .icon-btn {
      width: 38px;
      height: 38px;
      border: 1px solid transparent;
      border-radius: 4px;
    }
    .ribbon-group .icon-btn:hover {
      border-color: #f2c6b7;
      background: #fff4ef;
    }
    .ppt-workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: 260px minmax(520px, 1fr) 320px;
      background: #dfe3ea;
    }
    .ppt-sidebar,
    .ppt-inspector {
      min-height: 0;
      background: #f8fafc;
      border-right: 1px solid #cfd4dc;
      display: flex;
      flex-direction: column;
    }
    .ppt-inspector {
      border-right: 0;
      border-left: 1px solid #cfd4dc;
    }
    .pane-title {
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      font-size: 12px;
      font-weight: 700;
      color: #334155;
      border-bottom: 1px solid #e5e7eb;
      background: #fff;
    }
    .pane-body {
      min-height: 0;
      overflow: auto;
      padding: 10px;
    }
    .ppt-stage {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: 18px;
      gap: 10px;
    }
    .slide-frame {
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
    }
    .slide-frame .svg-box {
      width: 100%;
      height: 100%;
      min-height: 420px;
      border: 1px solid #b7bdc7;
      border-radius: 2px;
      background: #ffffff;
      box-shadow: 0 16px 32px rgba(15, 23, 42, 0.18);
    }
    .ppt-notes {
      min-height: 82px;
      max-height: 180px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px;
      gap: 10px;
    }
    .ppt-notes .log {
      height: 100%;
      min-height: 82px;
      overflow: auto;
      background: #fff;
    }
    .ppt-status-box {
      border: 1px solid #cfd4dc;
      background: #fff;
      padding: 8px;
      border-radius: 2px;
      font-size: 12px;
      overflow: auto;
    }
    .ppt-statusbar {
      min-height: 26px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      background: #ffffff;
      border-top: 1px solid #cfd4dc;
      color: #475569;
      font-size: 12px;
    }
    .inspector-section {
      border-bottom: 1px solid #e5e7eb;
      padding: 10px 0;
    }
    .inspector-section:first-child { padding-top: 0; }
    .inspector-section h3 {
      margin: 0 0 8px;
      font-size: 12px;
      color: #475569;
    }
    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .field-grid label,
    .single-field label {
      display: grid;
      gap: 4px;
      font-size: 11px;
      color: #64748b;
    }
    .field-grid input,
    .single-field input,
    .single-field textarea {
      min-width: 0;
      height: 30px;
      padding: 5px 7px;
      border-radius: 4px;
      font-family: Consolas, monospace;
      background: #fff;
    }
    .single-field textarea {
      height: 86px;
      resize: vertical;
    }
    .ppt-tabs {
      display: flex;
      gap: 4px;
      padding: 8px 8px 0;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
    }
    .ppt-tab {
      border: 1px solid #e5e7eb;
      border-bottom: 0;
      border-radius: 6px 6px 0 0;
      padding: 6px 8px;
      font-size: 12px;
      background: #f8fafc;
    }
    .ppt-tab.active {
      background: #fff;
      color: #b7472a;
      font-weight: 700;
    }
    .ppt-tab-panel { display: none; min-height: 0; }
    .ppt-tab-panel.active { display: block; }
    .ppt-tab-panel textarea {
      min-height: 210px;
      height: 34vh;
      border-radius: 4px;
      font-size: 12px;
    }
    .artifact-grid {
      grid-template-columns: 1fr;
      margin-top: 0;
    }
    .artifact-grid textarea {
      min-height: 120px;
      height: 18vh;
    }
    .tree {
      max-height: none;
      flex: 1 1 auto;
      min-height: 0;
      border-radius: 4px;
    }
    @media (max-width: 1180px) {
      .ppt-shell { min-width: 0; }
      .ppt-workspace { grid-template-columns: 220px minmax(420px, 1fr); }
      .ppt-inspector { display: none; }
    }
  </style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute;overflow:hidden" aria-hidden="true" focusable="false">
    <symbol id="icon-reload" viewBox="0 0 24 24"><path d="M20 11a8 8 0 1 0-2.3 5.7"/><path d="M20 4v7h-7"/></symbol>
    <symbol id="icon-save" viewBox="0 0 24 24"><path d="M5 4h12l2 2v14H5z"/><path d="M8 4v6h8V4"/><path d="M8 20v-6h8v6"/></symbol>
    <symbol id="icon-build" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></symbol>
    <symbol id="icon-snap" viewBox="0 0 24 24"><path d="M6 4v7a6 6 0 0 0 12 0V4"/><path d="M6 8h5"/><path d="M13 8h5"/><path d="M6 18l12-12"/></symbol>
    <symbol id="icon-align-left" viewBox="0 0 24 24"><path d="M5 4v16"/><path d="M9 7h10"/><path d="M9 12h7"/><path d="M9 17h11"/></symbol>
    <symbol id="icon-align-center" viewBox="0 0 24 24"><path d="M12 4v16"/><path d="M7 7h10"/><path d="M9 12h6"/><path d="M6 17h12"/></symbol>
    <symbol id="icon-align-right" viewBox="0 0 24 24"><path d="M19 4v16"/><path d="M5 7h10"/><path d="M8 12h7"/><path d="M4 17h11"/></symbol>
    <symbol id="icon-align-top" viewBox="0 0 24 24"><path d="M4 5h16"/><path d="M7 9v10"/><path d="M12 9v7"/><path d="M17 9v11"/></symbol>
    <symbol id="icon-align-middle" viewBox="0 0 24 24"><path d="M4 12h16"/><path d="M7 6v12"/><path d="M12 8v8"/><path d="M17 5v14"/></symbol>
    <symbol id="icon-align-bottom" viewBox="0 0 24 24"><path d="M4 19h16"/><path d="M7 5v10"/><path d="M12 8v7"/><path d="M17 4v11"/></symbol>
    <symbol id="icon-layer-front" viewBox="0 0 24 24"><path d="M8 8h10v10H8z"/><path d="M4 4h10v10H4z"/></symbol>
    <symbol id="icon-layer-back" viewBox="0 0 24 24"><path d="M4 4h10v10H4z"/><path d="M10 10h10v10H10z"/></symbol>
    <symbol id="icon-layer-forward" viewBox="0 0 24 24"><path d="M7 9h8v8H7z"/><path d="M11 5h8v8"/><path d="M15 9l4-4"/></symbol>
    <symbol id="icon-layer-backward" viewBox="0 0 24 24"><path d="M9 7h8v8H9z"/><path d="M5 11h8v8"/><path d="M9 15l-4 4"/></symbol>
    <symbol id="icon-undo" viewBox="0 0 24 24"><path d="M9 7H4v5"/><path d="M4 12a8 8 0 0 1 13.7-4.7"/></symbol>
    <symbol id="icon-redo" viewBox="0 0 24 24"><path d="M15 7h5v5"/><path d="M20 12A8 8 0 0 0 6.3 7.3"/></symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24"><path d="M4 7h16"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M6 7l1 13h10l1-13"/><path d="M9 7V4h6v3"/></symbol>
    <symbol id="icon-pick-all" viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/><path d="M8 8h3v3H8z"/><path d="M13 8h3v3h-3z"/><path d="M8 13h8v3H8z"/></symbol>
    <symbol id="icon-pick-line" viewBox="0 0 24 24"><path d="M5 18 19 6"/><path d="M6 6h12v12"/></symbol>
    <symbol id="icon-pick-text" viewBox="0 0 24 24"><path d="M5 6h14"/><path d="M12 6v14"/><path d="M8 20h8"/></symbol>
    <symbol id="icon-pick-shape" viewBox="0 0 24 24"><path d="M5 5h8v8H5z"/><path d="M16 6a3 3 0 1 0 0.1 0"/><path d="M15 16h4v4h-4z"/></symbol>
  </svg>
  <div class="wrap powerpoint">
    <section class="ppt-shell">
      <div>
        <div class="ppt-titlebar">
          <div>ModuMath Editor</div>
          <div id="selectedProblem" class="doc-name">없음</div>
          <input id="problemInput" list="problemOptions" placeholder="문제 경로 입력">
          <datalist id="problemOptions"></datalist>
        </div>
        <div class="ppt-ribbon">
          <div class="ribbon-group" data-label="파일">
            <button id="openBtn" class="icon-btn" title="Open" aria-label="Open"><svg><use href="#icon-reload"></use></svg></button>
            <button id="reloadBtn" class="icon-btn" title="Reload" aria-label="Reload"><svg><use href="#icon-reload"></use></svg></button>
            <button id="saveBtn" class="icon-btn primary" title="Save DSL" aria-label="Save DSL"><svg><use href="#icon-save"></use></svg></button>
            <button id="buildBtn" class="icon-btn" title="Build" aria-label="Build"><svg><use href="#icon-build"></use></svg></button>
            <button id="refreshListBtn" class="icon-btn" title="Refresh List" aria-label="Refresh List"><svg><use href="#icon-reload"></use></svg></button>
          </div>
          <div class="ribbon-group" data-label="선택">
            <button id="snapToggleBtn" class="icon-btn active" title="Snap: ON (5px)" aria-label="Snap: ON (5px)"><svg><use href="#icon-snap"></use></svg></button>
            <button id="pickAllBtn" class="icon-btn active" title="Pick: All" aria-label="Pick: All"><svg><use href="#icon-pick-all"></use></svg></button>
            <button id="pickLinePathBtn" class="icon-btn" title="Pick: Line/Path" aria-label="Pick: Line/Path"><svg><use href="#icon-pick-line"></use></svg></button>
            <button id="pickTextBtn" class="icon-btn" title="Pick: Text" aria-label="Pick: Text"><svg><use href="#icon-pick-text"></use></svg></button>
            <button id="pickShapeBtn" class="icon-btn" title="Pick: Shape" aria-label="Pick: Shape"><svg><use href="#icon-pick-shape"></use></svg></button>
          </div>
          <div class="ribbon-group" data-label="정렬">
            <button id="alignLeftBtn" class="icon-btn" title="Align Left" aria-label="Align Left"><svg><use href="#icon-align-left"></use></svg></button>
            <button id="alignCenterBtn" class="icon-btn" title="Align Center" aria-label="Align Center"><svg><use href="#icon-align-center"></use></svg></button>
            <button id="alignRightBtn" class="icon-btn" title="Align Right" aria-label="Align Right"><svg><use href="#icon-align-right"></use></svg></button>
            <button id="alignTopBtn" class="icon-btn" title="Align Top" aria-label="Align Top"><svg><use href="#icon-align-top"></use></svg></button>
            <button id="alignMiddleBtn" class="icon-btn" title="Align Middle" aria-label="Align Middle"><svg><use href="#icon-align-middle"></use></svg></button>
            <button id="alignBottomBtn" class="icon-btn" title="Align Bottom" aria-label="Align Bottom"><svg><use href="#icon-align-bottom"></use></svg></button>
          </div>
          <div class="ribbon-group" data-label="레이어">
            <button id="bringFrontBtn" class="icon-btn" title="Bring to Front" aria-label="Bring to Front"><svg><use href="#icon-layer-front"></use></svg></button>
            <button id="sendBackBtn" class="icon-btn" title="Send to Back" aria-label="Send to Back"><svg><use href="#icon-layer-back"></use></svg></button>
            <button id="bringForwardBtn" class="icon-btn" title="Bring Forward" aria-label="Bring Forward"><svg><use href="#icon-layer-forward"></use></svg></button>
            <button id="sendBackwardBtn" class="icon-btn" title="Send Backward" aria-label="Send Backward"><svg><use href="#icon-layer-backward"></use></svg></button>
          </div>
          <div class="ribbon-group" data-label="편집">
            <button id="undoBtn" class="icon-btn" title="Undo" aria-label="Undo"><svg><use href="#icon-undo"></use></svg></button>
            <button id="redoBtn" class="icon-btn" title="Redo" aria-label="Redo"><svg><use href="#icon-redo"></use></svg></button>
            <button id="deleteBtn" class="icon-btn danger" title="Delete Selected" aria-label="Delete Selected"><svg><use href="#icon-trash"></use></svg></button>
          </div>
        </div>
      </div>

      <div class="ppt-workspace">
        <aside class="ppt-sidebar">
          <div class="pane-title">문제 탐색</div>
          <div class="pane-body">
            <div class="tree-tools">
              <input id="problemFilterInput" placeholder="파일명 또는 폴더 검색">
            </div>
            <div class="tree-count" id="problemTreeCount"></div>
            <div class="tree" id="problemTree"></div>
          </div>
        </aside>

        <main class="ppt-stage">
          <div class="slide-frame">
            <div class="svg-box" id="svgPreview"><div class="marquee" id="marqueeBox"></div></div>
          </div>
          <div class="ppt-notes">
            <div class="log" id="buildLog"></div>
            <div class="ppt-status-box">
              <strong>상태</strong>
              <div id="status"></div>
            </div>
          </div>
        </main>

        <aside class="ppt-inspector">
          <div class="pane-title">속성</div>
          <div class="pane-body">
            <div class="inspector-section">
              <h3>선택</h3>
              <div class="single-field">
                <label>Slot ID<input id="slotId" placeholder="slot.q1"></label>
              </div>
            </div>
            <div class="inspector-section">
              <h3>위치/크기</h3>
              <div class="field-grid">
                <label>X<input id="propX" type="number" step="1"></label>
                <label>Y<input id="propY" type="number" step="1"></label>
                <label>W<input id="propW" type="number" step="1"></label>
                <label>H<input id="propH" type="number" step="1"></label>
                <label>Font<input id="propFontSize" type="number" step="1"></label>
                <label>Rotate<input id="propRotate" type="text" placeholder="rotate(...)"></label>
              </div>
            </div>
            <div class="inspector-section">
              <h3>텍스트</h3>
              <input id="textEditInput" placeholder="텍스트 요소를 선택하세요" disabled>
              <div class="row" style="margin-top:8px;">
                <button id="textEditBtn" disabled>Update Text</button>
              </div>
              <div class="row" style="margin-top:8px;">
                <button id="textAlignLeftBtn" title="Align text left">Left</button>
                <button id="textAlignCenterBtn" title="Align text center">Center</button>
                <button id="textAlignRightBtn" title="Align text right">Right</button>
              </div>
            </div>
            <div class="inspector-section">
              <h3>Patch</h3>
              <div class="single-field">
                <label>JSON<textarea id="patchJson">{"x":120.0,"y":80.0,"font_size":28}</textarea></label>
              </div>
              <div class="row" style="margin-top:8px;">
                <button id="patchBtn">Patch</button>
                <button id="patchBuildBtn">Patch + Build</button>
              </div>
            </div>
            <div class="ppt-tabs">
              <button class="ppt-tab active" data-tab="dslPanel">DSL</button>
              <button class="ppt-tab" data-tab="artifactPanel">JSON</button>
            </div>
            <div id="dslPanel" class="ppt-tab-panel active">
              <textarea id="dslEditor"></textarea>
            </div>
            <div id="artifactPanel" class="ppt-tab-panel">
              <div class="artifact-grid">
                <div>
                  <h2>Semantic</h2>
                  <textarea id="semanticView" readonly></textarea>
                </div>
                <div>
                  <h2>Solvable</h2>
                  <textarea id="solvableView" readonly></textarea>
                </div>
                <div>
                  <h2>Layout</h2>
                  <textarea id="layoutView" readonly></textarea>
                </div>
                <div>
                  <h2>Renderer</h2>
                  <textarea id="rendererView" readonly></textarea>
                </div>
              </div>
            </div>
          </div>
        </aside>
      </div>

      <div class="ppt-statusbar">
        <span>Drag, resize, align, edit text</span>
        <span>Snap 5px | Ctrl/Cmd+Z | Delete</span>
      </div>
    </section>
  </div>

  <script>
    let currentProblemId = null;
    let knownProblems = [];
    let dragState = null;
    let resizeState = null;
    let selectedSlots = new Map();
    let selectedSlotId = null;
    let selectedElement = null;
    let keyboardCommitTimer = null;
    let undoStack = [];
    let redoStack = [];
    let historyBusy = false;
    let dragFrameRequested = false;
    let lastDragStatusAt = 0;
    let dragCommitTimer = null;
    let dragCommitTask = null;
    let pendingPatchSaves = [];
    let copyBuffer = null;
    let pasteSequence = 0;
    let pickMode = "all";
    let marqueeState = null;
    let inlineTextEditState = null;
    let snapEnabled = true;
    let collapsedProblemFolders = new Set();
    const SNAP_STEP = 5;

    function setStatus(text, ok = true) {
      const el = document.getElementById("status");
      el.className = ok ? "ok" : "err";
      el.textContent = text;
    }

    function snapValue(v) {
      if (!snapEnabled) return v;
      return Math.round(v / SNAP_STEP) * SNAP_STEP;
    }

    function updateSnapButton() {
      const btn = document.getElementById("snapToggleBtn");
      if (!btn) return;
      const label = snapEnabled ? "Snap: ON (5px)" : "Snap: OFF";
      btn.classList.toggle("active", snapEnabled);
      btn.title = label;
      btn.setAttribute("aria-label", label);
    }

    async function api(url, options) {
      const res = await fetch(url, options);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || JSON.stringify(data));
      return data;
    }

    function renderSvg(svgText) {
      const preview = document.getElementById("svgPreview");
      inlineTextEditState = null;
      preview.innerHTML = (svgText || "<em>SVG 없음</em>") + '<div class="marquee" id="marqueeBox"></div><input id="inlineTextEditor" class="inline-text-editor" autocomplete="off" spellcheck="false">';
      selectedSlots = new Map();
      selectedSlotId = null;
      selectedElement = null;
      resizeState = null;
      bindSlotInteractions();
      applyPickMode();
      updateSelectionHandles();
      updateTextEditControls();
    }

    function renderJsonView(id, value) {
      const el = document.getElementById(id);
      if (!el) return;
      if (value === null || value === undefined) {
        el.value = "";
        return;
      }
      el.value = typeof value === "string" ? value : JSON.stringify(value, null, 2);
    }

    function renderArtifacts(artifacts) {
      renderSvg(artifacts?.svg || null);
      renderJsonView("semanticView", artifacts?.semantic || null);
      renderJsonView("solvableView", artifacts?.solvable || null);
      renderJsonView("layoutView", artifacts?.layout || null);
      renderJsonView("rendererView", artifacts?.renderer || null);
    }

    function getSvgPoint(svg, clientX, clientY) {
      const pt = svg.createSVGPoint();
      pt.x = clientX;
      pt.y = clientY;
      const ctm = svg.getScreenCTM();
      if (!ctm) return { x: 0, y: 0 };
      return pt.matrixTransform(ctm.inverse());
    }

    function svgBBoxClientRect(el) {
      const svg = document.getElementById("svgPreview").querySelector("svg");
      if (!svg || !el || !el.getBBox) return null;
      let box = null;
      try {
        box = el.getBBox();
      } catch (_) {
        return null;
      }
      const ctm = svg.getScreenCTM();
      if (!ctm) return null;
      const point = svg.createSVGPoint();
      const corners = [
        [box.x, box.y],
        [box.x + box.width, box.y],
        [box.x, box.y + box.height],
        [box.x + box.width, box.y + box.height],
      ].map(([x, y]) => {
        point.x = x;
        point.y = y;
        return point.matrixTransform(ctm);
      });
      const xs = corners.map((p) => p.x);
      const ys = corners.map((p) => p.y);
      const left = Math.min(...xs);
      const right = Math.max(...xs);
      const top = Math.min(...ys);
      const bottom = Math.max(...ys);
      return { left, top, right, bottom, width: right - left, height: bottom - top };
    }

    function clientRectToSvgBox(svg, rect) {
      if (!svg || !rect || rect.width < 0 || rect.height < 0) return null;
      const ctm = svg.getScreenCTM();
      if (!ctm) return null;
      const point = svg.createSVGPoint();
      const inv = ctm.inverse();
      const corners = [
        [rect.left, rect.top],
        [rect.right, rect.top],
        [rect.right, rect.bottom],
        [rect.left, rect.bottom],
      ].map(([x, y]) => {
        point.x = x;
        point.y = y;
        return point.matrixTransform(inv);
      });
      const xs = corners.map((p) => p.x);
      const ys = corners.map((p) => p.y);
      const minX = Math.min(...xs);
      const minY = Math.min(...ys);
      const maxX = Math.max(...xs);
      const maxY = Math.max(...ys);
      return { x: minX, y: minY, width: maxX - minX, height: maxY - minY };
    }

    function inflatedBoxForStroke(el, box) {
      if (!el || !box) return box;
      const raw = el.getAttribute("stroke-width") || el.style?.getPropertyValue("stroke-width") || "0";
      const strokeWidth = Number.parseFloat(raw);
      const pad = Number.isFinite(strokeWidth) ? strokeWidth / 2 : 0;
      if (pad <= 0) return box;
      return {
        x: box.x - pad,
        y: box.y - pad,
        width: box.width + pad * 2,
        height: box.height + pad * 2,
      };
    }

    function visualSvgBox(el, svg) {
      if (!el || !svg) return null;
      const wasSelected = el.classList.contains("slot-selected");
      if (wasSelected) el.classList.remove("slot-selected");
      try {
        const rect = el.getBoundingClientRect && el.getBoundingClientRect();
        if (rect && (rect.width > 0 || rect.height > 0)) {
          return inflatedBoxForStroke(el, clientRectToSvgBox(svg, rect));
        }
      } catch (_) {
        // Fall through to geometry bbox.
      } finally {
        if (wasSelected) el.classList.add("slot-selected");
      }
      try {
        const raw = el.getBBox();
        const ctm = el.getCTM && el.getCTM();
        if (!ctm) return inflatedBoxForStroke(el, raw);
        const point = svg.createSVGPoint();
        const corners = [
          [raw.x, raw.y],
          [raw.x + raw.width, raw.y],
          [raw.x + raw.width, raw.y + raw.height],
          [raw.x, raw.y + raw.height],
        ].map(([x, y]) => {
          point.x = x;
          point.y = y;
          return point.matrixTransform(ctm);
        });
        const xs = corners.map((p) => p.x);
        const ys = corners.map((p) => p.y);
        const minX = Math.min(...xs);
        const minY = Math.min(...ys);
        const maxX = Math.max(...xs);
        const maxY = Math.max(...ys);
        return inflatedBoxForStroke(el, { x: minX, y: minY, width: maxX - minX, height: maxY - minY });
      } catch (_) {
        return null;
      }
    }

    function geometrySvgBox(el) {
      if (!el || !el.getBBox) return null;
      try {
        return inflatedBoxForStroke(el, el.getBBox());
      } catch (_) {
        return null;
      }
    }

    function hideInlineTextEditor() {
      const editor = document.getElementById("inlineTextEditor");
      if (editor) editor.style.display = "none";
      inlineTextEditState = null;
    }

    async function finishInlineTextEdit(commit = true) {
      const state = inlineTextEditState;
      const editor = document.getElementById("inlineTextEditor");
      if (!state || !editor) return;
      inlineTextEditState = null;
      editor.style.display = "none";
      if (!commit) {
        state.el.textContent = state.originalText;
        updateTextEditControls();
        return;
      }
      const text = editor.value;
      if (text === state.originalText) {
        updateTextEditControls();
        return;
      }
      state.el.textContent = text;
      updateSelectionHandles();
      updateTextEditControls();
      try {
        await commitPatches([{ target: state.slotId, op: "update", value: { text } }], `텍스트 수정 완료: ${state.slotId}`);
      } catch (e) {
        setStatus(String(e), false);
      }
    }

    function beginInlineTextEdit(el, slotId, ev) {
      const editor = document.getElementById("inlineTextEditor");
      const container = document.getElementById("svgPreview");
      const rect = svgBBoxClientRect(el);
      if (!editor || !container || !rect) return false;
      setSelectedElement(el, slotId, false);
      const containerRect = container.getBoundingClientRect();
      const scale = (() => {
        const svg = container.querySelector("svg");
        const ctm = svg ? svg.getScreenCTM() : null;
        return ctm ? Math.sqrt(ctm.a * ctm.a + ctm.b * ctm.b) : 1;
      })();
      const fontSize = Number(el.getAttribute("font-size") || 28) * scale;
      editor.value = el.textContent || "";
      editor.style.left = `${rect.left - containerRect.left - 2}px`;
      editor.style.top = `${rect.top - containerRect.top - 2}px`;
      editor.style.width = `${Math.max(48, rect.width + 12)}px`;
      editor.style.height = `${Math.max(24, rect.height + 8)}px`;
      editor.style.fontSize = `${Math.max(12, fontSize)}px`;
      editor.style.fontFamily = el.getAttribute("font-family") || '"Segoe UI", "Pretendard", sans-serif';
      editor.style.display = "block";
      inlineTextEditState = { el, slotId, originalText: el.textContent || "" };
      editor.onkeydown = (keyEv) => {
        if (keyEv.key === "Enter") {
          keyEv.preventDefault();
          finishInlineTextEdit(true);
        } else if (keyEv.key === "Escape") {
          keyEv.preventDefault();
          finishInlineTextEdit(false);
        }
      };
      editor.onblur = () => finishInlineTextEdit(true);
      requestAnimationFrame(() => {
        editor.focus();
        editor.select();
      });
      setStatus(`텍스트 편집: ${slotId}`, true);
      ev.preventDefault();
      ev.stopPropagation();
      return true;
    }

    async function commitPatches(patches, reason = "저장 완료", withBuild = true) {
      if (!currentProblemId) return;
      if (!patches || !patches.length) return;
      const preserveSelection = Array.from(selectedSlots.keys());
      const payload = { patches };
      const endpoint = withBuild ? "/layout-patch-and-build/" : "/layout-patch/";
      const savePromise = api(encodedProblemPath(currentProblemId, endpoint), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      pendingPatchSaves.push(savePromise);
      let data;
      try {
        data = await savePromise;
      } finally {
        pendingPatchSaves = pendingPatchSaves.filter((item) => item !== savePromise);
      }
      document.getElementById("dslEditor").value = data.dsl || "";
      if (withBuild) {
        renderArtifacts(data.artifacts || null);
        renderLog(data.build?.stdout || "", data.build?.stderr || "");
        restoreSelection(preserveSelection);
      }
      const last = patches[patches.length - 1];
      const slotId = last.target;
      const value = last.value;
      document.getElementById("slotId").value = slotId;
      document.getElementById("patchJson").value = value === undefined ? "" : JSON.stringify(value, null, 2);
      updateInspectorControls();
      setStatus(reason, true);
    }

    function restoreSelection(slotIds) {
      if (!slotIds || !slotIds.length) return;
      clearSelection();
      for (const slotId of slotIds) {
        const el = findElementBySlotId(slotId);
        if (el) setSelectedElement(el, slotId, true);
      }
      updateSelectionHandles();
      updateTextEditControls();
    }

    async function commitSlotPatch(slotId, value, reason = "저장 완료", withBuild = true) {
      await commitPatches([{ target: slotId, op: "update", value }], reason, withBuild);
    }

    function queueDragCommit(task) {
      if (dragCommitTimer) clearTimeout(dragCommitTimer);
      dragCommitTask = task;
      dragCommitTimer = setTimeout(async () => {
        dragCommitTimer = null;
        const queuedTask = dragCommitTask;
        dragCommitTask = null;
        if (queuedTask) await queuedTask();
      }, 120);
    }

    async function flushPendingPatchSaves() {
      if (dragCommitTimer) {
        clearTimeout(dragCommitTimer);
        dragCommitTimer = null;
        const queuedTask = dragCommitTask;
        dragCommitTask = null;
        if (queuedTask) await queuedTask();
      }
      while (pendingPatchSaves.length) {
        await Promise.allSettled([...pendingPatchSaves]);
      }
    }

    function extractDslSlotIds() {
      const ids = new Set();
      const layoutText = document.getElementById("layoutView")?.value || "";
      if (layoutText.trim()) {
        try {
          const layout = JSON.parse(layoutText);
          const slots = Array.isArray(layout.slots) ? layout.slots : [];
          for (const slot of slots) {
            if (slot && typeof slot.id === "string" && slot.id) ids.add(slot.id);
          }
        } catch (_) {
          // Fall back to source scanning below while the layout pane is stale or invalid.
        }
      }

      const dsl = document.getElementById("dslEditor").value || "";
      const re = /\bid\s*=\s*["']([^"']+)["']/g;
      let m = null;
      while ((m = re.exec(dsl)) !== null) {
        ids.add(m[1]);
      }
      return ids;
    }

    function isDirectDslSlotId(slotId) {
      return extractDslSlotIds().has(slotId);
    }

    function toDslSlotId(svgElementId) {
      const ids = toDslSlotIds(svgElementId);
      return ids.length ? ids[0] : svgElementId;
    }

    function toDslSlotIds(svgElementId) {
      if (!svgElementId) return [];
      const dslIds = extractDslSlotIds();
      if (dslIds.has(svgElementId)) return [svgElementId];
      const parts = svgElementId.split(".");
      while (parts.length > 1) {
        parts.pop();
        const candidate = parts.join(".");
        if (dslIds.has(candidate)) return [candidate];
        const splitCandidates = Array.from(dslIds)
          .filter((id) => id.startsWith(`${candidate}_`))
          .sort((a, b) => a.localeCompare(b, "ko"));
        if (splitCandidates.length > 0) return splitCandidates;
      }
      return [];
    }

    function fallbackSlotIdFromSvgId(svgElementId) {
      if (!svgElementId) return "";
      const base = String(svgElementId)
        .replace(/\.(text|line|rect|path|polygon|circle)$/i, "")
        .replace(/__(hit|proxy)$/i, "");
      if (!base || base === "selectionOverlay") return "";
      if (!base.startsWith("slot.")) return "";
      return base;
    }

    function parseFractionPartId(svgElementId) {
      if (!svgElementId) return null;
      const base = svgElementId.replace(/\.(text|line|rect|path|polygon|circle)$/i, "");
      const m = base.match(/^(slot\..+)\.(num|bar|den)$/);
      if (!m) return null;
      return { prefix: m[1], part: m[2] };
    }

    function isDraggableSlotElement(el) {
      if (!el) return false;
      if (el.classList && (el.classList.contains("selection-handle") || el.classList.contains("selection-bounds") || el.classList.contains("selection-line") || el.classList.contains("slot-hit-proxy"))) return false;
      const tag = el.tagName.toLowerCase();
      return tag === "text" || tag === "rect" || tag === "circle" || tag === "line" || tag === "path" || tag === "polygon";
    }

    function draggableSlotElements(svg, prefix = null) {
      if (!svg) return [];
      const out = [];
      for (const node of svg.querySelectorAll("[id]")) {
        if (!isDraggableSlotElement(node)) continue;
        const sid = slotIdFromElement(node);
        if (!sid) continue;
        if (prefix && !sid.startsWith(prefix)) continue;
        out.push(node);
      }
      return out;
    }

    function matchesPickMode(el) {
      if (!el) return false;
      const tag = el.tagName.toLowerCase();
      if (pickMode === "all") return true;
      if (pickMode === "linepath") {
        if (!(tag === "line" || tag === "path")) return false;
        const id = el.getAttribute("id") || "";
        // Exclude fraction bars in line/path pick mode.
        if (/^slot\..+\.bar\.line$/i.test(id)) return false;
        return true;
      }
      if (pickMode === "text") return tag === "text";
      if (pickMode === "shape") return tag === "rect" || tag === "circle" || tag === "polygon";
      return true;
    }

    function slotIdFromElement(el) {
      const rawId = el ? el.getAttribute("id") : "";
      const fracInfo = parseFractionPartId(rawId);
      if (fracInfo) return fracInfo.prefix;
      const ids = toDslSlotIds(rawId);
      return ids.length ? ids[0] : fallbackSlotIdFromSvgId(rawId);
    }

    function slotIdsFromElement(el) {
      const rawId = el ? el.getAttribute("id") : "";
      const fracInfo = parseFractionPartId(rawId);
      if (fracInfo) return [fracInfo.prefix];
      const ids = toDslSlotIds(rawId);
      return ids.length ? ids : (fallbackSlotIdFromSvgId(rawId) ? [fallbackSlotIdFromSvgId(rawId)] : []);
    }

    function arrowBaseFromSlotId(slotId) {
      if (!slotId || !slotId.includes("arrow")) return null;
      // e.g. slot.arrow_head, slot.arrow_body, slot.arrow.head -> slot.arrow
      const base = slotId
        .replace(/(?:_head\d*|_body\d*)$/i, "")
        .replace(/(?:\.head\d*|\.body\d*)$/i, "");
      if (base !== slotId) return base;
      // body id can be already base-shaped: slot.label.arrow
      if (/(?:^|[._])arrow$/i.test(slotId)) return slotId;
      return null;
    }

    function collectArrowGroupSlotIds(slotId) {
      const base = arrowBaseFromSlotId(slotId);
      if (!base) return [slotId];
      const svg = document.getElementById("svgPreview").querySelector("svg");
      if (!svg) return [slotId];
      const out = new Set([slotId]);
      const nodes = draggableSlotElements(svg);
      for (const node of nodes) {
        const sid = slotIdFromElement(node);
        if (!sid) continue;
        if (sid === base || sid.startsWith(`${base}_head`) || sid.startsWith(`${base}_body`) || sid.startsWith(`${base}.head`) || sid.startsWith(`${base}.body`)) {
          out.add(sid);
        }
      }
      return Array.from(out);
    }

    function figureBaseFromSlotId(slotId) {
      if (!slotId) return null;
      const m = slotId.match(/^(slot\.figure\.[^.]+)\./);
      return m ? m[1] : null;
    }

    function characterGroupInfoFromSlotId(slotId) {
      if (!slotId) return null;
      let m = slotId.match(/^slot\.([^.]+)\.(?:bubble|tail|text|person(?:\.|$))/);
      if (m) return { kind: "speaker", key: m[1], base: `slot.character.${m[1]}` };
      m = slotId.match(/^slot\.name\.([^.]+)\.(?:box|text)$/);
      if (m) return { kind: "speaker", key: m[1], base: `slot.character.${m[1]}` };
      m = slotId.match(/^slot\.person_(left|mid|right)(?:\.|$)/);
      if (m) return { kind: "cardPerson", key: m[1], base: `slot.character.${m[1]}` };
      m = slotId.match(/^slot\.(?:name|card)_(left|mid|right)(?:$|_)/);
      if (m) return { kind: "cardPerson", key: m[1], base: `slot.character.${m[1]}` };
      return null;
    }

    function characterGroupBaseFromSlotId(slotId) {
      const info = characterGroupInfoFromSlotId(slotId);
      if (!info) return null;
      const group = collectCharacterGroupSlotIds(slotId);
      return group ? group.base : null;
    }

    function tableLayoutSlotIds() {
      const ids = new Set();
      const layoutText = document.getElementById("layoutView")?.value || "";
      if (!layoutText.trim()) return ids;
      try {
        const layout = JSON.parse(layoutText);
        for (const slot of Array.isArray(layout.slots) ? layout.slots : []) {
          const id = typeof slot?.id === "string" ? slot.id : "";
          const role = slot?.content?.style_role;
          if (id.startsWith("slot.table.") || role === "table") ids.add(id);
        }
      } catch (_) {
        // Layout pane can be stale while a problem is loading.
      }
      return ids;
    }

    function tableBaseFromSlotId(slotId) {
      if (!slotId) return null;
      const ids = tableLayoutSlotIds();
      if (ids.has(slotId) || slotId.startsWith("slot.table.")) return "slot.table";
      return null;
    }

    function paperFoldBaseFromSlotId(slotId) {
      if (!slotId) return null;
      const m = slotId.match(/^(slot\.[^.]+)\.(?:stage\d+|arrow\d+)(?:\.|$)/);
      return m ? m[1] : null;
    }

    function generatedHelperBaseFromSlotId(slotId) {
      if (!slotId) return null;
      if (slotId.startsWith("slot.grid.")) return "slot.grid";
      const point = slotId.match(/^(slot\.pt\.[^.]+)\./);
      if (point) return point[1];
      return null;
    }

    function measurementToolBaseFromSlotId(slotId) {
      if (!slotId) return null;
      const m = slotId.match(/^(slot\..+)\.(?:ruler|compass)(?:\.|$)/);
      return m ? m[1] : null;
    }

    function collectTableGroupSlotIds(slotId) {
      const base = tableBaseFromSlotId(slotId);
      if (!base) return null;
      const svg = document.getElementById("svgPreview").querySelector("svg");
      if (!svg) return null;
      const layoutIds = tableLayoutSlotIds();
      const out = [];
      for (const node of draggableSlotElements(svg)) {
        const sid = slotIdFromElement(node);
        if (!sid) continue;
        if ((sid.startsWith(`${base}.`) || layoutIds.has(sid)) && !out.includes(sid)) out.push(sid);
      }
      return out.length ? { base, slotIds: out, groupKind: "table" } : null;
    }

    function selectableGroupBaseFromSlotId(slotId) {
      return figureBaseFromSlotId(slotId) || characterGroupBaseFromSlotId(slotId) || tableBaseFromSlotId(slotId) || paperFoldBaseFromSlotId(slotId) || measurementToolBaseFromSlotId(slotId) || generatedHelperBaseFromSlotId(slotId);
    }

    function collectFigureGroupSlotIds(slotId) {
      const base = figureBaseFromSlotId(slotId);
      if (!base) return null;
      const svg = document.getElementById("svgPreview").querySelector("svg");
      if (!svg) return null;
      const out = [];
      for (const node of draggableSlotElements(svg, "slot.figure.")) {
        const sid = slotIdFromElement(node);
        if (sid && sid.startsWith(`${base}.`) && !out.includes(sid)) out.push(sid);

    function collectCharacterGroupSlotIds(slotId) {
      const info = characterGroupInfoFromSlotId(slotId);
      if (!info) return null;
      const svg = document.getElementById("svgPreview").querySelector("svg");
      if (!svg) return null;
      const out = [];
      let hasPerson = false;
      for (const node of draggableSlotElements(svg)) {
        const sid = slotIdFromElement(node);
        if (!sid) continue;
        let include = false;
        if (info.kind === "speaker") {
          include = sid.startsWith(`slot.${info.key}.`) || sid.startsWith(`slot.name.${info.key}.`);
          if (sid.startsWith(`slot.${info.key}.person.`)) hasPerson = true;
        } else if (info.kind === "cardPerson") {
          include = sid.startsWith(`slot.person_${info.key}.`) || sid === `slot.name_${info.key}` || sid.startsWith(`slot.name_${info.key}_`) || sid === `slot.card_${info.key}` || sid.startsWith(`slot.card_${info.key}_`);
          if (sid.startsWith(`slot.person_${info.key}.`)) hasPerson = true;
        }
        if (include && !out.includes(sid)) out.push(sid);
      }
      return hasPerson && out.length > 1 ? { base: info.base, slotIds: out, groupKind: "character" } : null;
    }

    function collectPaperFoldGroupSlotIds(slotId) {
      const base = paperFoldBaseFromSlotId(slotId);
      if (!base) return null;
      const svg = document.getElementById("svgPreview").querySelector("svg");
      if (!svg) return null;
      const out = [];
      for (const node of draggableSlotElements(svg, `${base}.`)) {
        const sid = slotIdFromElement(node);
        if (sid && sid.startsWith(`${base}.`) && !out.includes(sid)) out.push(sid);
      }
      return out.length > 1 ? { base, slotIds: out, groupKind: "paperFold" } : null;
    }

    function collectGeneratedHelperGroupSlotIds(slotId) {
      const base = generatedHelperBaseFromSlotId(slotId);
      if (!base) return null;
      const svg = document.getElementById("svgPreview").querySelector("svg");
      if (!svg) return null;
      const out = [];
      for (const node of draggableSlotElements(svg, `${base}.`)) {
        const sid = slotIdFromElement(node);
        if (sid && sid.startsWith(`${base}.`) && !out.includes(sid)) out.push(sid);
      }
      return out.length > 1 ? { base, slotIds: out, groupKind: "generated" } : null;
    }

    function collectMeasurementToolGroupSlotIds(slotId) {
      const base = measurementToolBaseFromSlotId(slotId);
      if (!base) return null;
      const svg = document.getElementById("svgPreview").querySelector("svg");
      if (!svg) return null;
      const out = [];
      for (const node of draggableSlotElements(svg, `${base}.`)) {
        const sid = slotIdFromElement(node);
        if (!sid) continue;
        if ((sid.startsWith(`${base}.ruler.`) || sid.startsWith(`${base}.compass.`)) && !out.includes(sid)) out.push(sid);
      }
      return out.length > 1 ? { base, slotIds: out, groupKind: "measurement" } : null;
    }

    function collectSelectableGroupSlotIds(slotId) {
      return collectFigureGroupSlotIds(slotId) || collectCharacterGroupSlotIds(slotId) || collectTableGroupSlotIds(slotId) || collectPaperFoldGroupSlotIds(slotId) || collectMeasurementToolGroupSlotIds(slotId) || collectGeneratedHelperGroupSlotIds(slotId);
    }

    function elementsForSlotIds(slotIds) {
      const svg = document.getElementById("svgPreview").querySelector("svg");
      if (!svg) return [];
      const out = [];
      for (const node of draggableSlotElements(svg)) {
        const sid = slotIdFromElement(node);
        if (slotIds.includes(sid)) out.push(node);
      }
      return out;
    }

    function applyPickMode() {
      const svg = document.getElementById("svgPreview").querySelector("svg");
      if (!svg) return;
      const nodes = draggableSlotElements(svg);
      for (const node of nodes) {
        if (matchesPickMode(node)) node.classList.remove("pick-disabled");
        else node.classList.add("pick-disabled");
      }
      document.getElementById("pickAllBtn").classList.toggle("active", pickMode === "all");
      document.getElementById("pickLinePathBtn").classList.toggle("active", pickMode === "linepath");
      document.getElementById("pickTextBtn").classList.toggle("active", pickMode === "text");
      document.getElementById("pickShapeBtn").classList.toggle("active", pickMode === "shape");
    }

    function intersects(a, b) {
      return a.x <= b.x + b.width && a.x + a.width >= b.x && a.y <= b.y + b.height && a.y + a.height >= b.y;
    }

    function beginMarquee(svg, ev) {
      const container = document.getElementById("svgPreview");
      const box = document.getElementById("marqueeBox");
      const start = getSvgPoint(svg, ev.clientX, ev.clientY);
      marqueeState = {
        svg,
        pointerId: ev.pointerId,
        startSvg: start,
        startClientX: ev.clientX,
        startClientY: ev.clientY,
      };
      box.style.display = "block";
      box.style.left = `${ev.clientX - container.getBoundingClientRect().left}px`;
      box.style.top = `${ev.clientY - container.getBoundingClientRect().top}px`;
      box.style.width = "0px";
      box.style.height = "0px";
      try {
        svg.setPointerCapture(ev.pointerId);
      } catch (_) {
        // Synthetic pointer events in tests may not have an active pointer.
      }
    }

    function updateMarquee(ev) {
      if (!marqueeState) return;
      const container = document.getElementById("svgPreview");
      const box = document.getElementById("marqueeBox");
      const cr = container.getBoundingClientRect();
      const x1 = marqueeState.startClientX - cr.left;
      const y1 = marqueeState.startClientY - cr.top;
      const x2 = ev.clientX - cr.left;
      const y2 = ev.clientY - cr.top;
      box.style.left = `${Math.min(x1, x2)}px`;
      box.style.top = `${Math.min(y1, y2)}px`;
      box.style.width = `${Math.abs(x2 - x1)}px`;
      box.style.height = `${Math.abs(y2 - y1)}px`;
    }

    function endMarquee(ev) {
      if (!marqueeState) return;
      const local = marqueeState;
      marqueeState = null;
      const box = document.getElementById("marqueeBox");
      box.style.display = "none";
      if (local.svg.hasPointerCapture(local.pointerId)) local.svg.releasePointerCapture(local.pointerId);

      const end = getSvgPoint(local.svg, ev.clientX, ev.clientY);
      const pickRect = {
        x: Math.min(local.startSvg.x, end.x),
        y: Math.min(local.startSvg.y, end.y),
        width: Math.abs(end.x - local.startSvg.x),
        height: Math.abs(end.y - local.startSvg.y),
      };
      if (pickRect.width < 2 && pickRect.height < 2) {
        clearSelection();
        return;
      }

      clearSelection();
      const nodes = draggableSlotElements(local.svg);
      for (const node of nodes) {
        if (!matchesPickMode(node)) continue;
        let bb = null;
        try {
          bb = node.getBBox();
        } catch (_) {
          bb = null;
        }
        if (!bb || !intersects(pickRect, bb)) continue;
        const slotId = slotIdFromElement(node);
        if (!slotId) continue;
        setSelectedElement(node, slotId, true);
      }
      setStatus(`영역 선택: ${selectedSlots.size}개`, true);
    }

    function findDraggableSlotAncestor(node) {
      let cur = node;
      while (cur && cur.tagName && cur.tagName.toLowerCase() !== "svg") {
        if (cur.id && isDraggableSlotElement(cur) && slotIdsFromElement(cur).length) return cur;
        cur = cur.parentNode;
      }
      return null;
    }

    function inflateHitBox(box, pad) {
      if (!box) return null;
      return {
        x: box.x - pad,
        y: box.y - pad,
        width: box.width + pad * 2,
        height: box.height + pad * 2,
      };
    }

    function elementHitBox(node, svg = null) {
      const tag = node.tagName.toLowerCase();
      if (tag === "rect") {
        const x = Number(node.getAttribute("x") || 0);
        const y = Number(node.getAttribute("y") || 0);
        const width = Number(node.getAttribute("width") || 0);
        const height = Number(node.getAttribute("height") || 0);
        return width > 0 && height > 0 ? { x, y, width, height } : null;
      }
      if (tag === "text") {
        if (node.getAttribute("data-slot-kind") === "text_box") {
          const x = Number(node.getAttribute("data-box-x") || node.getAttribute("x") || 0);
          const y = Number(node.getAttribute("data-box-y") || node.getAttribute("y") || 0);
          const width = Number(node.getAttribute("data-box-width") || 0);
          const height = Number(node.getAttribute("data-box-height") || 0);
          return width > 0 && height > 0 ? { x, y, width, height } : null;
        }
        const text = node.textContent || "";
        const fontSize = Number(node.getAttribute("font-size") || node.getAttribute("font_size") || 28);
        const x = Number(node.getAttribute("x") || 0);
        const y = Number(node.getAttribute("y") || 0);
        const lineCount = Math.max(1, text.split(/\n/).length);
        const maxLineLength = Math.max(1, ...text.split(/\n/).map((line) => line.length));
        const width = Math.max(fontSize * 0.8, maxLineLength * fontSize * 0.62);
        const height = lineCount * fontSize * 1.25;
        return { x: x - 6, y: y - fontSize, width: width + 12, height: height + 8 };
      }
      if (tag === "line") {
        if (svg && node.getAttribute("transform")) {
          return inflateHitBox(visualSvgBox(node, svg), 8);
        }
        const x1 = Number(node.getAttribute("x1") || 0);
        const y1 = Number(node.getAttribute("y1") || 0);
        const x2 = Number(node.getAttribute("x2") || 0);
        const y2 = Number(node.getAttribute("y2") || 0);
        const pad = Math.max(8, Number(node.getAttribute("stroke-width") || 1) * 3);
        return {
          x: Math.min(x1, x2) - pad,
          y: Math.min(y1, y2) - pad,
          width: Math.abs(x2 - x1) + pad * 2,
          height: Math.abs(y2 - y1) + pad * 2,
        };
      }
      if (tag === "circle") {
        if (svg && node.getAttribute("transform")) {
          return inflateHitBox(visualSvgBox(node, svg), 8);
        }
        const cx = Number(node.getAttribute("cx") || 0);
        const cy = Number(node.getAttribute("cy") || 0);
        const r = Number(node.getAttribute("r") || 0);
        if (!Number.isFinite(cx) || !Number.isFinite(cy) || !Number.isFinite(r)) return null;
        const pad = Math.max(8, Number(node.getAttribute("stroke-width") || 1) * 3);
        const rr = Math.max(0, r) + pad;
        return { x: cx - rr, y: cy - rr, width: rr * 2, height: rr * 2 };
      }
      try {
        const bb = node.getBBox();
        if (!bb) return null;
        if (tag === "path" || tag === "polygon") {
          if (svg && node.getAttribute("transform")) {
            return inflateHitBox(visualSvgBox(node, svg), 8);
          }
          const pad = Math.max(8, Number(node.getAttribute("stroke-width") || 1) * 3);
          return { x: bb.x - pad, y: bb.y - pad, width: bb.width + pad * 2, height: bb.height + pad * 2 };
        }
        return bb;
      } catch (_) {
        return null;
      }
    }

    function pickPriority(node) {
      const tag = node.tagName.toLowerCase();
      if (tag === "circle" || tag === "line" || tag === "path") return 0;
      if (tag === "polygon") return 1;
      if (tag === "text") return 2;
      if (tag === "rect") return 3;
      return 4;
    }

    function matchingSlotElementAtPoint(svg, clientX, clientY) {
      const point = getSvgPoint(svg, clientX, clientY);
      const nodes = draggableSlotElements(svg);
      const candidates = [];
      for (let i = nodes.length - 1; i >= 0; i -= 1) {
        const node = nodes[i];
        if (!matchesPickMode(node)) continue;
        const bb = elementHitBox(node, svg);
        if (!bb) continue;
        if (point.x >= bb.x && point.x <= bb.x + bb.width && point.y >= bb.y && point.y <= bb.y + bb.height) {
          const area = Math.max(0, bb.width) * Math.max(0, bb.height);
          candidates.push({ node, priority: pickPriority(node), area, z: i });
        }
      }
      if (candidates.length) {
        candidates.sort((a, b) => a.priority - b.priority || a.area - b.area || b.z - a.z);
        return candidates[0].node;
      }
      const seen = new Set();
      for (const node of document.elementsFromPoint(clientX, clientY)) {
        if (!(node instanceof SVGElement) || !svg.contains(node)) continue;
        const slotTarget = findDraggableSlotAncestor(node);
        if (!slotTarget || seen.has(slotTarget)) continue;
        seen.add(slotTarget);
        if (matchesPickMode(slotTarget)) return slotTarget;
      }
      return null;
    }

    function readSlotPatchValue(el) {
      const tag = el.tagName.toLowerCase();
      const transform = el.getAttribute("transform") || "";
      const withTransform = (value) => {
        if (transform) value.transform = transform;
        return value;
      };
      const styleAttrs = (names) => {
        const out = {};
        for (const name of names) {
          const attrName = name.replace(/_/g, "-");
          const raw = el.getAttribute(attrName) || el.style?.getPropertyValue(attrName) || "";
          if (raw && raw !== "none") out[name] = name === "stroke_width" ? Number(raw) : raw;
        }
        return out;
      };
      const readText = () => {
        const tspans = Array.from(el.querySelectorAll("tspan"));
        if (tspans.length) return tspans.map((node) => node.textContent || "").join("\n");
        return el.textContent || "";
      };
      if (tag === "text") {
        if (el.getAttribute("data-slot-kind") === "text_box") {
          return withTransform({
            text: readText(),
            x: Number(el.getAttribute("data-box-x") || 0),
            y: Number(el.getAttribute("data-box-y") || 0),
            width: Number(el.getAttribute("data-box-width") || 0),
            height: Number(el.getAttribute("data-box-height") || 0),
            font_size: Number(el.getAttribute("font-size") || el.getAttribute("font_size") || 0) || undefined,
            fill: el.getAttribute("fill") || undefined,
          });
        }
        return withTransform({
          text: readText(),
          x: Number(el.getAttribute("x") || 0),
          y: Number(el.getAttribute("y") || 0),
          font_size: Number(el.getAttribute("font-size") || el.getAttribute("font_size") || 0) || undefined,
          max_width: Number(el.getAttribute("max_width") || el.getAttribute("max-width") || 0) || undefined,
          anchor: el.getAttribute("text-anchor") || el.getAttribute("anchor") || undefined,
          ...styleAttrs(["fill"]),
        });
      }
      if (tag === "rect") {
        return withTransform({
          x: Number(el.getAttribute("x") || 0),
          y: Number(el.getAttribute("y") || 0),
          width: Number(el.getAttribute("width") || 0),
          height: Number(el.getAttribute("height") || 0),
          rx: Number(el.getAttribute("rx") || 0) || undefined,
          ry: Number(el.getAttribute("ry") || 0) || undefined,
          ...styleAttrs(["fill", "stroke", "stroke_width"]),
        });
      }
      if (tag === "circle") {
        return withTransform({
          cx: Number(el.getAttribute("cx") || 0),
          cy: Number(el.getAttribute("cy") || 0),
          r: Number(el.getAttribute("r") || 0),
          ...styleAttrs(["fill", "stroke", "stroke_width"]),
        });
      }
      if (tag === "line") {
        return withTransform({
          x1: Number(el.getAttribute("x1") || 0),
          y1: Number(el.getAttribute("y1") || 0),
          x2: Number(el.getAttribute("x2") || 0),
          y2: Number(el.getAttribute("y2") || 0),
          ...styleAttrs(["stroke", "stroke_width", "stroke_dasharray"]),
        });
      }
      if (tag === "path") {
        return withTransform({ d: el.getAttribute("d") || "", ...styleAttrs(["fill", "stroke", "stroke_width", "stroke_dasharray"]) });
      }
      if (tag === "polygon") {
        const pts = parsePolygonPoints(el.getAttribute("points") || "");
        return withTransform({ points: pts, ...styleAttrs(["fill", "stroke", "stroke_width"]) });
      }
      return null;
    }

    function parseRotateTransform(transform) {
      const m = String(transform || "").match(/rotate\(\s*(-?\d+(?:\.\d+)?)\s+(-?\d+(?:\.\d+)?)\s+(-?\d+(?:\.\d+)?)\s*\)/);
      if (!m) return { angle: 0, cx: null, cy: null };
      return { angle: Number(m[1]) || 0, cx: Number(m[2]), cy: Number(m[3]) };
    }

    function pointInRotatedFrame(point, rotation) {
      if (!rotation || !rotation.angle || rotation.cx === null || rotation.cy === null) return point;
      const radians = (-rotation.angle * Math.PI) / 180;
      const cos = Math.cos(radians);
      const sin = Math.sin(radians);
      const dx = point.x - rotation.cx;
      const dy = point.y - rotation.cy;
      return {
        x: rotation.cx + dx * cos - dy * sin,
        y: rotation.cy + dx * sin + dy * cos,
      };
    }

    function rotateTransform(angle, cx, cy) {
      const roundedAngle = Math.abs(angle) < 0.0001 ? 0 : Number(angle.toFixed(2));
      const rx = Number(cx.toFixed(2));
      const ry = Number(cy.toFixed(2));
      return `rotate(${roundedAngle} ${rx} ${ry})`;
    }

    function shiftRotateTransform(transform, dx, dy, useSnap = true) {
      if (!transform) return transform;
      const snap = (v) => (useSnap ? snapValue(v) : v);
      return String(transform).replace(
        /rotate\(\s*(-?\d+(?:\.\d+)?)\s+(-?\d+(?:\.\d+)?)\s+(-?\d+(?:\.\d+)?)\s*\)/g,
        (_, angle, cx, cy) => rotateTransform(Number(angle) || 0, snap(Number(cx) + dx), snap(Number(cy) + dy))
      );
    }

    function shiftElementRotateCenter(el, dx, dy, useSnap = true) {
      const transform = el.getAttribute("transform") || "";
      if (!transform || !/rotate\(/.test(transform)) return null;
      const shifted = shiftRotateTransform(transform, dx, dy, useSnap);
      el.setAttribute("transform", shifted);
      return shifted;
    }

    function shiftedStartRotateTransform(startValue, dx, dy, useSnap = true) {
      const transform = startValue && startValue.transform;
      if (!transform || !/rotate\(/.test(transform)) return null;
      return shiftRotateTransform(transform, dx, dy, useSnap);
    }

    function rotationValueFromPointer(startValue, startBox, startPoint, pointerPoint) {
      const cx = startBox.x + startBox.width / 2;
      const cy = startBox.y + startBox.height / 2;
      const a0 = Math.atan2(startPoint.y - cy, startPoint.x - cx);
      const a1 = Math.atan2(pointerPoint.y - cy, pointerPoint.x - cx);
      const prior = parseRotateTransform(startValue && startValue.transform);
      let angle = prior.angle + ((a1 - a0) * 180) / Math.PI;
      if (snapEnabled) angle = Math.round(angle / 5) * 5;
      return { ...startValue, transform: rotateTransform(angle, cx, cy) };
    }

    function rotationValuesForGroup(startEntries, startBox, startPoint, pointerPoint) {
      return (startEntries || []).map((entry) => ({
        ...entry,
        value: rotationValueFromPointer(entry.value, startBox, startPoint, pointerPoint),
      }));
    }

    function pathTokens(d) {
      return (d || "").match(/[a-zA-Z]|-?\d*\.?\d+(?:e[-+]?\d+)?/g) || [];
    }

    const PATH_PARAM_COUNTS = { M: 2, L: 2, T: 2, H: 1, V: 1, C: 6, S: 4, Q: 4, A: 7 };

    function transformPathD(d, mapCoord, mapRadius = null) {
      const tokens = pathTokens(d);
      const out = [];
      let i = 0;
      let cmd = null;
      let firstMove = true;

      const isCommand = (token) => /^[a-zA-Z]$/.test(token);
      const num = (token) => Number(token);
      const emit = (value) => out.push(String(value));

      while (i < tokens.length) {
        if (isCommand(tokens[i])) {
          cmd = tokens[i];
          out.push(cmd);
          i += 1;
          if (cmd === "M" || cmd === "m") firstMove = true;
          if (cmd === "Z" || cmd === "z") continue;
        }
        if (!cmd) break;

        const upper = cmd.toUpperCase();
        const count = PATH_PARAM_COUNTS[upper];
        if (!count) break;

        while (i < tokens.length && !isCommand(tokens[i])) {
          if (i + count > tokens.length) {
            emit(tokens[i]);
            i += 1;
            continue;
          }
          const vals = tokens.slice(i, i + count).map(num);
          if (vals.some((v) => !Number.isFinite(v))) {
            emit(tokens[i]);
            i += 1;
            continue;
          }

          const relative = cmd === cmd.toLowerCase();
          const shouldMap = !relative || (upper === "M" && firstMove);
          const coord = (x, y) => shouldMap ? mapCoord(x, y) : [x, y];

          if (upper === "H") {
            const mapped = shouldMap ? mapCoord(vals[0], 0)[0] : vals[0];
            emit(mapped);
          } else if (upper === "V") {
            const mapped = shouldMap ? mapCoord(0, vals[0])[1] : vals[0];
            emit(mapped);
          } else if (upper === "A") {
            const radii = mapRadius ? mapRadius(vals[0], vals[1]) : [vals[0], vals[1]];
            const end = coord(vals[5], vals[6]);
            emit(radii[0]); emit(radii[1]); emit(vals[2]); emit(vals[3]); emit(vals[4]); emit(end[0]); emit(end[1]);
          } else {
            for (let j = 0; j < vals.length; j += 2) {
              const p = coord(vals[j], vals[j + 1]);
              emit(p[0]); emit(p[1]);
            }
          }

          i += count;
          if (upper === "M") firstMove = false;
        }
      }
      return out.join(" ");
    }

    function shiftPathD(d, dx, dy, useSnap = true) {
      const snap = (v) => (useSnap ? snapValue(v) : v);
      return transformPathD(d, (x, y) => [snap(x + dx), snap(y + dy)]);
    }

    function scalePathD(d, startBox, nextBox, useSnap = true) {
      const snap = (v) => (useSnap ? snapValue(v) : v);
      const sx = nextBox.width / Math.max(startBox.width, 1);
      const sy = nextBox.height / Math.max(startBox.height, 1);
      return transformPathD(
        d,
        (x, y) => [snap(nextBox.x + (x - startBox.x) * sx), snap(nextBox.y + (y - startBox.y) * sy)],
        (rx, ry) => [snap(rx * sx), snap(ry * sy)]
      );
    }

    function parsePolygonPoints(raw) {
      return (raw || "")
        .trim()
        .split(/\s+/)
        .filter(Boolean)
        .map((pair) => {
          const [x, y] = pair.split(",");
          return [Number(x), Number(y)];
        })
        .filter(([x, y]) => Number.isFinite(x) && Number.isFinite(y));
    }

    function formatPolygonPoints(points) {
      return points.map(([x, y]) => `${x},${y}`).join(" ");
    }

    function textBoxTextX(el, x, width) {
      const anchor = el.getAttribute("text-anchor") || "";
      if (anchor === "middle") return x + width / 2;
      if (anchor === "end") return x + width;
      return x;
    }

    function moveTextBoxTspans(el, textX, dy = 0, snap = (v) => v) {
      for (const tspan of el.querySelectorAll("tspan")) {
        tspan.setAttribute("x", String(textX));
        tspan.setAttribute("y", String(snap(Number(tspan.getAttribute("y") || 0) + dy)));
      }
    }

    function syncSlotHitProxies(el) {
      const proxies = el && el.__slotHitProxies;
      if (!Array.isArray(proxies)) return;
      const tag = el.tagName.toLowerCase();
      const copyAttrs = tag === "line" ? ["x1", "y1", "x2", "y2", "transform"] :
        tag === "path" ? ["d", "transform"] :
        tag === "polygon" ? ["points", "transform"] :
        [];
      for (const proxy of proxies) {
        for (const name of copyAttrs) {
          const value = el.getAttribute(name);
          if (value !== null) proxy.setAttribute(name, value);
          else proxy.removeAttribute(name);
        }
      }
    }

    function applyElementDelta(el, dx, dy, useSnap = true) {
      const snap = (v) => (useSnap ? snapValue(v) : v);
      const tag = el.tagName.toLowerCase();
      if (tag === "text" && el.getAttribute("data-slot-kind") === "text_box") {
        const nx = snap(Number(el.getAttribute("data-box-x") || 0) + dx);
        const ny = snap(Number(el.getAttribute("data-box-y") || 0) + dy);
        const textX = snap(Number(el.getAttribute("x") || 0) + dx);
        const textY = snap(Number(el.getAttribute("y") || 0) + dy);
        el.setAttribute("data-box-x", String(nx));
        el.setAttribute("data-box-y", String(ny));
        el.setAttribute("x", String(textX));
        el.setAttribute("y", String(textY));
        const transform = shiftElementRotateCenter(el, dx, dy, useSnap);
        moveTextBoxTspans(el, textX, dy, snap);
        syncSlotHitProxies(el);
        const out = { x: nx, y: ny };
        if (transform) out.transform = transform;
        return out;
      }
      if (tag === "text" || tag === "rect") {
        const nx = snap(Number(el.getAttribute("x") || 0) + dx);
        const ny = snap(Number(el.getAttribute("y") || 0) + dy);
        el.setAttribute("x", String(nx));
        el.setAttribute("y", String(ny));
        const transform = shiftElementRotateCenter(el, dx, dy, useSnap);
        syncSlotHitProxies(el);
        const out = { x: nx, y: ny };
        if (transform) out.transform = transform;
        return out;
      }
      if (tag === "circle") {
        const ncx = snap(Number(el.getAttribute("cx") || 0) + dx);
        const ncy = snap(Number(el.getAttribute("cy") || 0) + dy);
        el.setAttribute("cx", String(ncx));
        el.setAttribute("cy", String(ncy));
        const transform = shiftElementRotateCenter(el, dx, dy, useSnap);
        syncSlotHitProxies(el);
        const out = { cx: ncx, cy: ncy };
        if (transform) out.transform = transform;
        return out;
      }
      if (tag === "line") {
        const nx1 = snap(Number(el.getAttribute("x1") || 0) + dx);
        const ny1 = snap(Number(el.getAttribute("y1") || 0) + dy);
        const nx2 = snap(Number(el.getAttribute("x2") || 0) + dx);
        const ny2 = snap(Number(el.getAttribute("y2") || 0) + dy);
        el.setAttribute("x1", String(nx1));
        el.setAttribute("y1", String(ny1));
        el.setAttribute("x2", String(nx2));
        el.setAttribute("y2", String(ny2));
        const transform = shiftElementRotateCenter(el, dx, dy, useSnap);
        syncSlotHitProxies(el);
        const out = { x1: nx1, y1: ny1, x2: nx2, y2: ny2 };
        if (transform) out.transform = transform;
        return out;
      }
      if (tag === "path") {
        const nd = shiftPathD(el.getAttribute("d") || "", dx, dy, useSnap);
        el.setAttribute("d", nd);
        const transform = shiftElementRotateCenter(el, dx, dy, useSnap);
        syncSlotHitProxies(el);
        const out = { d: nd };
        if (transform) out.transform = transform;
        return out;
      }
      if (tag === "polygon") {
        const pts = parsePolygonPoints(el.getAttribute("points") || "");
        const moved = pts.map(([x, y]) => {
          const nx = useSnap ? snapValue(x + dx) : x + dx;
          const ny = useSnap ? snapValue(y + dy) : y + dy;
          return [nx, ny];
        });
        el.setAttribute("points", formatPolygonPoints(moved));
        const transform = shiftElementRotateCenter(el, dx, dy, useSnap);
        syncSlotHitProxies(el);
        const out = { points: moved };
        if (transform) out.transform = transform;
        return out;
      }
      return null;
    }

    function ensureSelectionOverlay(svg) {
      let layer = svg.querySelector("#selectionOverlay");
      if (layer) return layer;
      layer = document.createElementNS("http://www.w3.org/2000/svg", "g");
      layer.setAttribute("id", "selectionOverlay");
      layer.setAttribute("class", "selection-overlay");
      const bounds = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      bounds.setAttribute("class", "selection-bounds");
      layer.appendChild(bounds);
      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("class", "selection-line");
      layer.appendChild(line);
      for (const name of ["r", "nw", "n", "ne", "w", "c", "e", "sw", "s", "se", "p1", "p2"]) {
        const handle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        handle.setAttribute("class", "selection-handle");
        handle.setAttribute("data-handle", name);
        handle.setAttribute("r", "5");
        handle.addEventListener("pointerdown", beginResizeFromHandle);
        layer.appendChild(handle);
      }
      svg.appendChild(layer);
      return layer;
    }

    function selectedResizableItem() {
      if (selectedSlots.size !== 1) return null;
      const item = Array.from(selectedSlots.values())[0];
      if (!item || item.isFraction || !item.el) return null;
      if (item.isCanvas) return item;
      if (item.isCharacterGroup || item.isPaperFoldGroup || item.isMeasurementGroup || item.isGeneratedGroup) return null;
      if (item.isFigureGroup || item.isTableGroup) return item;
      const tag = item.el.tagName.toLowerCase();
      if (!["text", "rect", "circle", "line", "path", "polygon"].includes(tag)) return null;
      return item;
    }

    function itemBBox(item) {
      if (item && item.isCanvas) {
        return getSvgCanvasBounds();
      }
      const svg = document.getElementById("svgPreview").querySelector("svg");
      if (item && !item.isFigureGroup && !item.isPaperFoldGroup && !item.isMeasurementGroup && !item.isTableGroup && !item.isFraction && item.el) {
        const rotation = parseRotateTransform(item.el.getAttribute("transform") || "");
        const rawBox = geometrySvgBox(item.el);
        if (rawBox && rotation.angle && rotation.cx !== null && rotation.cy !== null) return rawBox;
      }
      const elements = item && (item.isFigureGroup || item.isPaperFoldGroup || item.isMeasurementGroup || item.isTableGroup || item.isFraction || item.isGeneratedGroup) ? (item.elements || []) : [item.el];
      const boxes = [];
      for (const el of elements) {
        const box = visualSvgBox(el, svg);
        if (box) boxes.push(box);
      }
      if (!boxes.length) return null;
      const minX = Math.min(...boxes.map((b) => b.x));
      const minY = Math.min(...boxes.map((b) => b.y));
      const maxX = Math.max(...boxes.map((b) => b.x + b.width));
      const maxY = Math.max(...boxes.map((b) => b.y + b.height));
      return { x: minX, y: minY, width: maxX - minX, height: maxY - minY };
    }

    function selectionTransformForItem(item) {
      if (!item || item.isCanvas || item.isFigureGroup || item.isPaperFoldGroup || item.isMeasurementGroup || item.isTableGroup || item.isGeneratedGroup || item.isFraction || !item.el) return { transform: "", rotation: null };
      const rotation = parseRotateTransform(item.el.getAttribute("transform") || "");
      if (!rotation.angle || rotation.cx === null || rotation.cy === null) return { transform: "", rotation: null };
      return { transform: rotateTransform(rotation.angle, rotation.cx, rotation.cy), rotation };
    }

    function tableDividerInfo(el) {
      const slotId = slotIdFromElement(el);
      const m = slotId && slotId.match(/^slot\.table\.([vh])\d+$/);
      if (!m) return null;
      const value = readSlotPatchValue(el);
      if (!value) return null;
      const axis = m[1];
      const tag = el.tagName.toLowerCase();
      if (tag === "line" && value.x1 !== undefined) {
        return { slotId, axis, x1: value.x1, y1: value.y1, x2: value.x2, y2: value.y2 };
      }
      if (tag === "rect" && value.x !== undefined) {
        if (axis === "v") return { slotId, axis, x1: value.x, y1: value.y, x2: value.x, y2: value.y + (value.height || 0) };
        return { slotId, axis, x1: value.x, y1: value.y, x2: value.x + (value.width || 0), y2: value.y };
      }
      return null;
    }

    function updateTableAdjustmentHandles(svg, layer, item) {
      for (const old of layer.querySelectorAll(".table-adjust-handle")) old.remove();
      if (!item || !item.isTableGroup) return;
      for (const el of item.elements || []) {
        const info = tableDividerInfo(el);
        if (!info) continue;
        const handle = document.createElementNS("http://www.w3.org/2000/svg", "line");
        handle.setAttribute("class", "selection-handle table-adjust-handle");
        handle.setAttribute("data-handle", `table-${info.axis}:${info.slotId}`);
        handle.setAttribute("x1", String(info.x1));
        handle.setAttribute("y1", String(info.y1));
        handle.setAttribute("x2", String(info.x2));

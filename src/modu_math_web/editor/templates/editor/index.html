{% load static %}
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ModuMath Editor MVP</title>
  <link rel="stylesheet" href="{% static 'editor/css/editor.css' %}">
</head>
<body>
  <svg class="icon-sprite" width="0" height="0" aria-hidden="true" focusable="false">
    <symbol id="icon-reload" viewBox="0 0 24 24"><path d="M20 11a8 8 0 1 0-2.3 5.7"/><path d="M20 4v7h-7"/></symbol>
    <symbol id="icon-save" viewBox="0 0 24 24"><path d="M5 4h12l2 2v14H5z"/><path d="M8 4v6h8V4"/><path d="M8 20v-6h8v6"/></symbol>
    <symbol id="icon-format" viewBox="0 0 24 24"><path d="M5 6h14"/><path d="M5 10h10"/><path d="M5 14h14"/><path d="M5 18h8"/></symbol>
    <symbol id="icon-build" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></symbol>
    <symbol id="icon-snap" viewBox="0 0 24 24"><path d="M6 4v7a6 6 0 0 0 12 0V4"/><path d="M6 8h5"/><path d="M13 8h5"/><path d="M6 18l12-12"/></symbol>
    <symbol id="icon-align-left" viewBox="0 0 24 24"><path d="M5 4v16"/><path d="M9 7h10"/><path d="M9 12h7"/><path d="M9 17h11"/></symbol>
    <symbol id="icon-align-center" viewBox="0 0 24 24"><path d="M12 4v16"/><path d="M7 7h10"/><path d="M9 12h6"/><path d="M6 17h12"/></symbol>
    <symbol id="icon-align-right" viewBox="0 0 24 24"><path d="M19 4v16"/><path d="M5 7h10"/><path d="M8 12h7"/><path d="M4 17h11"/></symbol>
    <symbol id="icon-align-top" viewBox="0 0 24 24"><path d="M4 5h16"/><path d="M7 9v10"/><path d="M12 9v7"/><path d="M17 9v11"/></symbol>
    <symbol id="icon-align-middle" viewBox="0 0 24 24"><path d="M4 12h16"/><path d="M7 6v12"/><path d="M12 8v8"/><path d="M17 5v14"/></symbol>
    <symbol id="icon-align-bottom" viewBox="0 0 24 24"><path d="M4 19h16"/><path d="M7 5v10"/><path d="M12 8v7"/><path d="M17 4v11"/></symbol>
    <symbol id="icon-layer-front" viewBox="0 0 24 24"><path d="M8 8h10v10H8z"/><path d="M4 4h10v10H4z"/></symbol>
    <symbol id="icon-layer-back" viewBox="0 0 24 24"><path d="M4 4h10v10H4z"/><path d="M10 10h10v10H10z"/></symbol>
    <symbol id="icon-layer-forward" viewBox="0 0 24 24"><path d="M7 9h8v8H7z"/><path d="M11 5h8v8"/><path d="M15 9l4-4"/></symbol>
    <symbol id="icon-layer-backward" viewBox="0 0 24 24"><path d="M9 7h8v8H9z"/><path d="M5 11h8v8"/><path d="M9 15l-4 4"/></symbol>
    <symbol id="icon-undo" viewBox="0 0 24 24"><path d="M9 7H4v5"/><path d="M4 12a8 8 0 0 1 13.7-4.7"/></symbol>
    <symbol id="icon-redo" viewBox="0 0 24 24"><path d="M15 7h5v5"/><path d="M20 12A8 8 0 0 0 6.3 7.3"/></symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24"><path d="M4 7h16"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M6 7l1 13h10l1-13"/><path d="M9 7V4h6v3"/></symbol>
    <symbol id="icon-pick-all" viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/><path d="M8 8h3v3H8z"/><path d="M13 8h3v3h-3z"/><path d="M8 13h8v3H8z"/></symbol>
    <symbol id="icon-pick-line" viewBox="0 0 24 24"><path d="M5 18 19 6"/><path d="M6 6h12v12"/></symbol>
    <symbol id="icon-pick-text" viewBox="0 0 24 24"><path d="M5 6h14"/><path d="M12 6v14"/><path d="M8 20h8"/></symbol>
    <symbol id="icon-pick-shape" viewBox="0 0 24 24"><path d="M5 5h8v8H5z"/><path d="M16 6a3 3 0 1 0 0.1 0"/><path d="M15 16h4v4h-4z"/></symbol>
    <symbol id="icon-textbox" viewBox="0 0 24 24"><path d="M4 6h16v12H4z"/><path d="M8 9h8"/><path d="M12 9v7"/><path d="M9 16h6"/></symbol>
    <symbol id="icon-image" viewBox="0 0 24 24"><path d="M4 5h16v14H4z"/><circle cx="8" cy="9" r="1.5"/><path d="M4 16l5-5 4 4 2-2 5 5"/></symbol>
    <symbol id="icon-table" viewBox="0 0 24 24"><path d="M4 5h16v14H4z"/><path d="M4 10h16"/><path d="M4 15h16"/><path d="M10 5v14"/><path d="M16 5v14"/></symbol>
    <symbol id="icon-bar-model" viewBox="0 0 24 24"><path d="M4 7h16v4H4z"/><path d="M4 14h16v4H4z"/><path d="M10 7v4"/><path d="M15 7v4"/><path d="M10 14v4"/><path d="M15 14v4"/></symbol>
    <symbol id="icon-tick-bar" viewBox="0 0 24 24"><path d="M4 8h16"/><path d="M4 16h16"/><path d="M4 5v6"/><path d="M12 5v6"/><path d="M20 5v6"/><path d="M4 13v6"/><path d="M12 13v6"/><path d="M20 13v6"/><path d="M4 8h9"/><path d="M4 16h12"/></symbol>
    <symbol id="icon-graph-paper" viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/><path d="M8 4v16"/><path d="M12 4v16"/><path d="M16 4v16"/><path d="M4 8h16"/><path d="M4 12h16"/><path d="M4 16h16"/></symbol>
    <symbol id="icon-fraction" viewBox="0 0 24 24"><path d="M8 6h8"/><path d="M6 12h12"/><path d="M8 18h8"/></symbol>
    <symbol id="icon-mixed-fraction" viewBox="0 0 24 24"><path d="M4 8h3"/><path d="M4 16h3"/><path d="M12 6h8"/><path d="M10 12h12"/><path d="M12 18h8"/></symbol>
    <symbol id="icon-shapes" viewBox="0 0 24 24"><path d="M5 5h7v7H5z"/><path d="M16.5 5.5 21 12h-9z"/><path d="M8 16a3 3 0 1 0 0.1 0"/><path d="M15 16h5v4h-5z"/></symbol>
  </svg>
  <div class="wrap powerpoint">
    <section class="ppt-shell">
      <div>
        <div class="ppt-titlebar">
          <div>ModuMath Editor</div>
          <div id="selectedProblem" class="doc-name">없음</div>
          <input id="problemInput" list="problemOptions" placeholder="문제 경로 입력">
          <datalist id="problemOptions"></datalist>
        </div>
        <div class="ppt-ribbon">
          <div class="ribbon-group" data-label="파일">
            <button id="openBtn" class="icon-btn" title="Open" aria-label="Open"><svg><use href="#icon-reload"></use></svg></button>
            <button id="reloadBtn" class="icon-btn" title="Reload" aria-label="Reload"><svg><use href="#icon-reload"></use></svg></button>
            <button id="saveBtn" class="icon-btn primary" title="Save DSL" aria-label="Save DSL"><svg><use href="#icon-save"></use></svg></button>
            <button id="formatDslBtn" class="icon-btn" title="DSL 정리" aria-label="DSL 정리"><svg><use href="#icon-format"></use></svg></button>
            <button id="buildBtn" class="icon-btn" title="Build" aria-label="Build"><svg><use href="#icon-build"></use></svg></button>
            <button id="refreshListBtn" class="icon-btn" title="Refresh List" aria-label="Refresh List"><svg><use href="#icon-reload"></use></svg></button>
          </div>
          <div class="ribbon-group" data-label="삽입">
            <button id="insertTextBoxBtn" class="icon-btn" title="텍스트 삽입" aria-label="텍스트 삽입"><svg><use href="#icon-textbox"></use></svg></button>
            <button id="insertImageBtn" class="icon-btn" title="그림 삽입" aria-label="그림 삽입"><svg><use href="#icon-image"></use></svg></button>
            <button id="insertTableBtn" class="icon-btn" title="표 삽입" aria-label="표 삽입"><svg><use href="#icon-table"></use></svg></button>
            <button id="insertBarModelBtn" class="icon-btn" title="막대 모델 삽입" aria-label="막대 모델 삽입"><svg><use href="#icon-bar-model"></use></svg></button>
            <button id="insertTickBarBtn" class="icon-btn" title="눈금 막대 삽입" aria-label="눈금 막대 삽입"><svg><use href="#icon-tick-bar"></use></svg></button>
            <button id="insertGraphPaperBtn" class="icon-btn" title="모눈종이 삽입" aria-label="모눈종이 삽입"><svg><use href="#icon-graph-paper"></use></svg></button>
            <button id="insertFractionBtn" class="icon-btn" title="분수 삽입" aria-label="분수 삽입"><svg><use href="#icon-fraction"></use></svg></button>
            <button id="insertMixedFractionBtn" class="icon-btn" title="대분수 삽입" aria-label="대분수 삽입"><svg><use href="#icon-mixed-fraction"></use></svg></button>
            <input id="insertImageInput" type="file" accept="image/*" hidden>
            <div class="ribbon-dropdown">
              <button id="shapeGalleryBtn" class="icon-btn" title="도형 삽입" aria-label="도형 삽입"><svg><use href="#icon-shapes"></use></svg></button>
              <div id="shapeGallery" class="shape-gallery" role="menu" aria-label="도형"></div>
            </div>
          </div>
          <div class="ribbon-group" data-label="선택">
            <button id="snapToggleBtn" class="icon-btn active" title="Snap: ON (5px)" aria-label="Snap: ON (5px)"><svg><use href="#icon-snap"></use></svg></button>
            <button id="pickAllBtn" class="icon-btn active" title="Pick: All" aria-label="Pick: All"><svg><use href="#icon-pick-all"></use></svg></button>
            <button id="pickLinePathBtn" class="icon-btn" title="Pick: Line/Path" aria-label="Pick: Line/Path"><svg><use href="#icon-pick-line"></use></svg></button>
            <button id="pickTextBtn" class="icon-btn" title="Pick: Text" aria-label="Pick: Text"><svg><use href="#icon-pick-text"></use></svg></button>
            <button id="pickShapeBtn" class="icon-btn" title="Pick: Shape" aria-label="Pick: Shape"><svg><use href="#icon-pick-shape"></use></svg></button>
          </div>
          <div class="ribbon-group" data-label="정렬">
            <button id="alignLeftBtn" class="icon-btn" title="Align Left" aria-label="Align Left"><svg><use href="#icon-align-left"></use></svg></button>
            <button id="alignCenterBtn" class="icon-btn" title="Align Center" aria-label="Align Center"><svg><use href="#icon-align-center"></use></svg></button>
            <button id="alignRightBtn" class="icon-btn" title="Align Right" aria-label="Align Right"><svg><use href="#icon-align-right"></use></svg></button>
            <button id="alignTopBtn" class="icon-btn" title="Align Top" aria-label="Align Top"><svg><use href="#icon-align-top"></use></svg></button>
            <button id="alignMiddleBtn" class="icon-btn" title="Align Middle" aria-label="Align Middle"><svg><use href="#icon-align-middle"></use></svg></button>
            <button id="alignBottomBtn" class="icon-btn" title="Align Bottom" aria-label="Align Bottom"><svg><use href="#icon-align-bottom"></use></svg></button>
          </div>
          <div class="ribbon-group" data-label="레이어">
            <button id="bringFrontBtn" class="icon-btn" title="Bring to Front" aria-label="Bring to Front"><svg><use href="#icon-layer-front"></use></svg></button>
            <button id="sendBackBtn" class="icon-btn" title="Send to Back" aria-label="Send to Back"><svg><use href="#icon-layer-back"></use></svg></button>
            <button id="bringForwardBtn" class="icon-btn" title="Bring Forward" aria-label="Bring Forward"><svg><use href="#icon-layer-forward"></use></svg></button>
            <button id="sendBackwardBtn" class="icon-btn" title="Send Backward" aria-label="Send Backward"><svg><use href="#icon-layer-backward"></use></svg></button>
          </div>
          <div class="ribbon-group" data-label="편집">
            <button id="undoBtn" class="icon-btn" title="Undo" aria-label="Undo"><svg><use href="#icon-undo"></use></svg></button>
            <button id="redoBtn" class="icon-btn" title="Redo" aria-label="Redo"><svg><use href="#icon-redo"></use></svg></button>
            <button id="deleteBtn" class="icon-btn danger" title="Delete Selected" aria-label="Delete Selected"><svg><use href="#icon-trash"></use></svg></button>
          </div>
        </div>
      </div>

      <div class="ppt-workspace">
        <aside class="ppt-sidebar">
          <div class="pane-title">문제 탐색</div>
          <div class="pane-body">
            <div class="tree-tools">
              <input id="problemFilterInput" placeholder="파일명 또는 폴더 검색">
            </div>
            <div class="tree-count" id="problemTreeCount"></div>
            <div class="tree" id="problemTree"></div>
          </div>
        </aside>

        <main class="ppt-stage">
          <div class="slide-frame">
            <div class="svg-box" id="svgPreview"><div class="marquee" id="marqueeBox"></div></div>
            <div id="tableInsertDialog" class="table-dialog" role="dialog" aria-modal="true" aria-labelledby="tableInsertTitle" hidden>
              <div class="table-dialog-panel">
                <div class="table-dialog-title">
                  <span id="tableInsertTitle">표 삽입</span>
                  <span>?</span>
                  <button id="tableCancelXBtn" type="button" aria-label="닫기">&times;</button>
                </div>
                <div class="table-dialog-fields">
                  <label>열 개수(C):<input id="tableColsInput" type="number" min="1" max="20" value="5"></label>
                  <label>행 개수(R):<input id="tableRowsInput" type="number" min="1" max="20" value="2"></label>
                </div>
                <div class="table-dialog-actions">
                  <button id="tableConfirmBtn" type="button" class="primary">확인</button>
                  <button id="tableCancelBtn" type="button">취소</button>
                </div>
              </div>
            </div>
            <div id="graphPaperInsertDialog" class="table-dialog" role="dialog" aria-modal="true" aria-labelledby="graphPaperInsertTitle" hidden>
              <div class="table-dialog-panel">
                <div class="table-dialog-title">
                  <span id="graphPaperInsertTitle">모눈종이 삽입</span>
                  <span>?</span>
                  <button id="graphPaperCancelXBtn" type="button" aria-label="닫기">&times;</button>
                </div>
                <div class="table-dialog-fields">
                  <label>좌우 칸:<input id="graphPaperColsInput" type="number" min="1" max="40" value="10"></label>
                  <label>상하 칸:<input id="graphPaperRowsInput" type="number" min="1" max="40" value="8"></label>
                </div>
                <div class="table-dialog-actions">
                  <button id="graphPaperConfirmBtn" type="button" class="primary">확인</button>
                  <button id="graphPaperCancelBtn" type="button">취소</button>
                </div>
              </div>
            </div>
            <div id="barModelInsertDialog" class="table-dialog" role="dialog" aria-modal="true" aria-labelledby="barModelInsertTitle" hidden>
              <div class="table-dialog-panel">
                <div class="table-dialog-title">
                  <span id="barModelInsertTitle">막대 모델 삽입</span>
                  <span>?</span>
                  <button id="barModelCancelXBtn" type="button" aria-label="닫기">&times;</button>
                </div>
                <div class="table-dialog-fields">
                  <label>막대 수:<input id="barModelBarsInput" type="number" min="1" max="8" value="2"></label>
                  <label>칸 수:<input id="barModelCellsInput" type="number" min="1" max="20" value="3"></label>
                  <label>색칠 칸:<input id="barModelShadedInput" type="text" value="2,2" inputmode="text"></label>
                  <label>색칠색:<input id="barModelFillInput" type="text" value="#f3d7ea" inputmode="text"></label>
                  <label>테두리색:<input id="barModelStrokeInput" type="text" value="#666666" inputmode="text"></label>
                  <label>칸 점선:<input id="barModelDashedInput" type="checkbox" checked></label>
                </div>
                <div class="table-dialog-actions">
                  <button id="barModelConfirmBtn" type="button" class="primary">확인</button>
                  <button id="barModelCancelBtn" type="button">취소</button>
                </div>
              </div>
            </div>
            <div id="tickBarInsertDialog" class="table-dialog" role="dialog" aria-modal="true" aria-labelledby="tickBarInsertTitle" hidden>
              <div class="table-dialog-panel">
                <div class="table-dialog-title">
                  <span id="tickBarInsertTitle">눈금 막대 삽입</span>
                  <span>?</span>
                  <button id="tickBarCancelXBtn" type="button" aria-label="닫기">&times;</button>
                </div>
                <div class="table-dialog-fields">
                  <label>막대 수:<input id="tickBarRowsInput" type="number" min="1" max="8" value="2"></label>
                  <label>전체 눈금:<input id="tickBarTotalInput" type="number" min="1" max="40" value="14"></label>
                  <label>색칠 눈금:<input id="tickBarFilledInput" type="text" value="9,10" inputmode="text"></label>
                  <label>큰 눈금:<input id="tickBarMajorInput" type="number" min="0" max="40" value="7"></label>
                  <label>라벨:<input id="tickBarLabelsInput" type="text" value="" inputmode="text" placeholder="예: 9/7 m,1 3/7 m"></label>
                  <label>단위:<input id="tickBarUnitInput" type="text" value="m" inputmode="text"></label>
                  <label>눈금 라벨:<input id="tickBarScaleLabelsInput" type="checkbox" checked></label>
                  <label>분할 라벨:<input id="tickBarFractionLabelInput" type="checkbox" checked></label>
                  <label>눈금색:<input id="tickBarAxisColorInput" type="color" value="#111111"></label>
                  <label>색칠색:<input id="tickBarFillColorInput" type="color" value="#2563eb"></label>
                </div>
                <div class="table-dialog-actions">
                  <button id="tickBarConfirmBtn" type="button" class="primary">확인</button>
                  <button id="tickBarCancelBtn" type="button">취소</button>
                </div>
              </div>
            </div>
            <div id="mathInsertDialog" class="table-dialog" role="dialog" aria-modal="true" aria-labelledby="mathInsertTitle" hidden>
              <div class="table-dialog-panel">
                <div class="table-dialog-title">
                  <span id="mathInsertTitle">분수 삽입</span>
                  <span>?</span>
                  <button id="mathCancelXBtn" type="button" aria-label="닫기">&times;</button>
                </div>
                <div class="table-dialog-fields">
                  <label id="mathWholeLabel" hidden>자연수:<input id="mathWholeInput" type="text" value="1" inputmode="text"></label>
                  <label>분자:<input id="mathNumeratorInput" type="text" value="1" inputmode="text"></label>
                  <label>분모:<input id="mathDenominatorInput" type="text" value="2" inputmode="text"></label>
                </div>
                <div class="table-dialog-actions">
                  <button id="mathConfirmBtn" type="button" class="primary">확인</button>
                  <button id="mathCancelBtn" type="button">취소</button>
                </div>
              </div>
            </div>
            <div id="shapeFormatMenu" class="shape-format-menu" role="menu" aria-label="도형 서식">
              <div class="shape-format-title">도형 서식</div>
              <div class="shape-format-swatches" id="shapeFillSwatches"></div>
              <div class="shape-format-row">
                <input id="shapeFillColorInput" class="shape-format-color" type="color" value="#ffffff" title="채우기 색">
                <button id="shapeApplyFillBtn" class="shape-format-btn" type="button">채우기</button>
              </div>
              <div class="shape-format-swatches" id="shapeStrokeSwatches"></div>
              <div class="shape-format-row">
                <input id="shapeStrokeColorInput" class="shape-format-color" type="color" value="#111827" title="선 색">
                <button id="shapeApplyStrokeBtn" class="shape-format-btn" type="button">선 색</button>
              </div>
              <div class="shape-format-row">
                <button id="shapeNoBorderBtn" class="shape-format-btn" type="button">테두리 제거</button>
                <button id="shapeSolidBtn" class="shape-format-btn" type="button">실선</button>
                <button id="shapeShortDashBtn" class="shape-format-btn" type="button">짧은 점선</button>
              </div>
              <div class="shape-format-row">
                <button id="shapeDashedBtn" class="shape-format-btn" type="button">긴 점선</button>
                <button id="shapeDotDashBtn" class="shape-format-btn" type="button">점-대시</button>
                <button id="shapeDottedBtn" class="shape-format-btn" type="button">촘촘 점선</button>
              </div>
            </div>
          </div>
          <div class="ppt-notes">
            <div class="log" id="buildLog"></div>
            <div class="ppt-status-box">
              <strong>상태</strong>
              <div id="status"></div>
            </div>
          </div>
        </main>

        <aside class="ppt-inspector">
          <div class="pane-title">속성</div>
          <div class="pane-body">
            <div class="inspector-section">
              <h3>캔버스</h3>
              <div class="field-grid">
                <label>X<input id="canvasX" type="number" step="1" readonly></label>
                <label>Y<input id="canvasY" type="number" step="1" readonly></label>
                <label>W<input id="canvasW" type="number" step="1"></label>
                <label>H<input id="canvasH" type="number" step="1"></label>
              </div>
              <div class="row mt-8">
                <button id="selectCanvasBtn" type="button">Select Canvas</button>
              </div>
            </div>
            <div class="inspector-section">
              <h3>선택</h3>
              <div class="single-field">
                <label>Slot ID<input id="slotId" placeholder="slot.q1"></label>
              </div>
            </div>
            <div class="inspector-section">
              <h3>위치/크기</h3>
              <div class="field-grid">
                <label>X<input id="propX" type="number" step="1"></label>
                <label>Y<input id="propY" type="number" step="1"></label>
                <label>W<input id="propW" type="number" step="1"></label>
                <label>H<input id="propH" type="number" step="1"></label>
                <label>Font<input id="propFontSize" type="number" step="1"></label>
                <label>Rotate<input id="propRotate" type="text" placeholder="rotate(...)"></label>
              </div>
            </div>
            <div class="inspector-section">
              <h3>텍스트</h3>
              <input id="textEditInput" placeholder="텍스트 요소를 선택하세요" disabled>
              <div class="row mt-8">
                <button id="textEditBtn" disabled>Update Text</button>
              </div>
              <div class="row mt-8">
                <button id="fontDecreaseBtn" title="Font Smaller" aria-label="Font Smaller">A-</button>
                <button id="fontIncreaseBtn" title="Font Larger" aria-label="Font Larger">A+</button>
              </div>
              <div class="row mt-8">
                <button id="textAlignLeftBtn" title="Align text left">Left</button>
                <button id="textAlignCenterBtn" title="Align text center">Center</button>
                <button id="textAlignRightBtn" title="Align text right">Right</button>
              </div>
            </div>
            <div class="inspector-section">
              <h3>Patch</h3>
              <div class="single-field">

  <text id="q1" x="16" y="422" font-family="Malgun Gothic" font-size="24" fill="#222222" font-weight="normal" text-anchor="start">[보기]와 같은 방법으로 처음 사각기둥에서 각각 꼭짓점</text>
  <text id="q2" x="16" y="462" font-family="Malgun Gothic" font-size="24" fill="#222222" font-weight="normal" text-anchor="start">ㄴ, ㄹ, ㅁ, ㅅ을 각뿔의 꼭짓점으로 하는 삼각뿔 모양 4</text>
  <text id="q3" x="16" y="502" font-family="Malgun Gothic" font-size="24" fill="#222222" font-weight="normal" text-anchor="start">개를 자르려고 합니다. 가장 큰 삼각뿔 모양이 되도록 모</text>
  <text id="q4" x="16" y="542" font-family="Malgun Gothic" font-size="24" fill="#222222" font-weight="normal" text-anchor="start">두 잘랐을 때 자르고 남은 도형의 모든 모서리의 길이의</text>
  <text id="q5" x="16" y="576" font-family="Malgun Gothic" font-size="24" fill="#222222" font-weight="normal" text-anchor="start">합은 몇 cm입니까?</text>

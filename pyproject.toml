[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "math-problem-pipeline"
version = "0.1.0"
description = "HWPX -> semantic JSON -> renderer pipeline for school math problems"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "pydantic>=2.7,<3",
  "typer>=0.12,<1",
  "manim>=0.18,<1",
]

[project.optional-dependencies]
dev = ["pytest>=8,<9"]

[project.scripts]
math-pipeline = "math_problem_pipeline.cli:app"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

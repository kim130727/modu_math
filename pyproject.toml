[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "modu-semantic"
version = "0.1.0"
description = "Python DSL library that compiles geometry/problem layouts to semantic JSON and SVG"
readme = "README.md"
requires-python = ">=3.10"
dependencies = []

[project.scripts]
modu = "modu_semantic.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
addopts = "-q"